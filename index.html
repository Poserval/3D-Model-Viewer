<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Constructor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">
    <div class="header">
        <img src="icons/logo_constructor.png" alt="3D Constructor" class="logo">
        <p class="subtitle">Создавай · Конвертируй · Вдохновляйся</p>
    </div>

    <div class="buttons-container">
        <!-- Кнопка Конвертер -->
        <button class="main-btn converter-btn" onclick="navigateTo('converter')">
            <div class="btn-icon-wrapper">
                <span class="btn-icon">🔄</span>
            </div>
            <div class="btn-text-wrapper">
                <div class="btn-title">КОНВЕРТЕР</div>
                <div class="btn-subtitle">STL · OBJ · GLB · GLTF · PLY · 3DS</div>
            </div>
        </button>

        <!-- Кнопка Генератор 3D -->
        <button class="main-btn generator-btn" onclick="navigateTo('generator')">
            <div class="btn-icon-wrapper">
                <span class="btn-icon">✨</span>
            </div>
            <div class="btn-text-wrapper">
                <div class="btn-title">ГЕНЕРАТОР 3D</div>
                <div class="btn-subtitle">Text‑to‑3D / Image‑to‑3D</div>
            </div>
        </button>

        <!-- Кнопка Каталог 3D -->
        <button class="main-btn catalog-btn" onclick="navigateTo('catalog')">
            <div class="btn-icon-wrapper">
                <span class="btn-icon">📚</span>
            </div>
            <div class="btn-text-wrapper">
                <div class="btn-title">КАТАЛОГ 3D</div>
                <div class="btn-subtitle">Cults3D · Бесплатные модели</div>
            </div>
        </button>

        <!-- Кнопка 3D Viewer -->
        <button class="main-btn viewer-btn-main" onclick="openViewerApp()">
            <div class="btn-icon-wrapper">
                <span class="btn-icon">📱</span>
            </div>
            <div class="btn-text-wrapper">
                <div class="btn-title">3D VIEWER</div>
                <div class="btn-subtitle">Просмотр · Конвертация</div>
            </div>
        </button>
    </div>
</div>

<div id="toast-message" class="toast"></div>
<script src="script.js"></script>
</body>
</html>
