<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer</title>
    <meta name="theme-color" content="#007AFF">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
</head>
<body>
    <!-- ГЛАВНЫЙ ЭКРАН (ПРОСМОТР 3D) -->
    <div id="main-screen" class="screen active">
        <div class="container">
            <div class="app-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer Logo" class="logo-image">
            </div>
            
            <div id="preview-area" class="preview-area">
                <div id="preview-placeholder" class="preview-placeholder">
                    <span>ВЫБЕРИТЕ 3D МОДЕЛЬ</span>
                </div>
                
                <!-- Model Viewer для GLB/GLTF/OBJ -->
                <model-viewer id="preview-model" class="preview-model" hidden></model-viewer>
                
                <!-- Three.js Canvas для STL -->
                <canvas id="preview-threejs" class="preview-threejs" hidden></canvas>
                
                <!-- Индикатор загрузки -->
                <div id="loading-indicator" class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка модели...</div>
                    <div class="loading-progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                </div>
            </div>
            
            <input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl" hidden>
            <button id="select-file-btn" class="btn primary">Выбрать файл</button>
            <button id="open-3d-btn" class="btn secondary" disabled>Открыть в 3D</button>
            
            <!-- КНОПКА ПЕРЕХОДА НА КОНВЕРТЕР -->
            <button id="go-to-converter-btn" class="btn secondary" style="margin-top: 10px;">🔄 Конвертер форматов</button>
            
            <div id="file-name" class="file-name"></div>
        </div>
    </div>

    <!-- ЭКРАН КОНВЕРТЕРА -->
    <div id="converter-screen" class="screen">
        <header class="header">
            <button id="back-from-converter-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 class="viewer-title">Конвертер форматов</h2>
        </header>
        
        <div class="converter-container">
            <div class="converter-card">
                <h3 style="color: white; margin-bottom: 20px;">🔄 Выберите файл и форматы</h3>
                
                <input type="file" id="converter-file-input" accept=".glb,.gltf,.obj,.stl" hidden>
                <button id="converter-select-file-btn" class="btn primary" style="width: 100%; margin-bottom: 15px;">📁 Выбрать файл</button>
                <div id="converter-file-name" class="file-name" style="margin-bottom: 20px;"></div>
                
                <div style="display: flex; gap: 10px; justify-content: space-between; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label style="color: white; display: block; margin-bottom: 5px;">Из формата:</label>
                        <select id="converter-format-from" class="converter-select">
                            <option value="glb">GLB (Binary glTF)</option>
                            <option value="gltf">GLTF (JSON glTF)</option>
                            <option value="obj">OBJ (Wavefront)</option>
                            <option value="stl">STL (Stereolithography)</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="color: white; display: block; margin-bottom: 5px;">В формат:</label>
                        <select id="converter-format-to" class="converter-select">
                            <option value="glb">GLB (Binary glTF)</option>
                            <option value="gltf">GLTF (JSON glTF)</option>
                            <option value="obj">OBJ (Wavefront)</option>
                            <option value="stl">STL (Stereolithography)</option>
                        </select>
                    </div>
                </div>
                
                <button id="converter-start-btn" class="btn primary" style="width: 100%; margin-bottom: 20px;" disabled>🔄 Начать конвертацию</button>
                
                <!-- Прогресс конвертации -->
                <div id="converter-progress-container" style="display: none; margin-bottom: 20px;">
                    <div style="color: white; margin-bottom: 5px;">Конвертация...</div>
                    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden;">
                        <div id="converter-progress-bar" style="width: 0%; height: 100%; background: #007AFF; transition: width 0.3s;"></div>
                    </div>
                    <div id="converter-progress-text" style="color: white; text-align: right; margin-top: 5px;">0%</div>
                </div>
                
                <!-- Результат конвертации -->
                <div id="converter-result-container" style="display: none; text-align: center;">
                    <a id="converter-download-link" href="#" style="color: #007AFF; text-decoration: underline; font-weight: bold; font-size: 18px;">📥 Скачать конвертированный файл</a>
                </div>
            </div>
            
            <div class="converter-info">
                <p style="color: rgba(255,255,255,0.7); font-size: 14px; text-align: center;">
                    ⚡ Конвертация происходит прямо на вашем устройстве<br>без отправки файлов в интернет
                </p>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ПРОСМОТРА 3D -->
    <div id="viewer-screen" class="screen">
        <header class="header">
            <button id="back-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 id="viewer-title" class="viewer-title"></h2>
        </header>
        <div class="viewer-container">
            <!-- Model Viewer для GLB/GLTF/OBJ -->
            <model-viewer id="main-model" class="main-model" 
                camera-controls 
                auto-rotate
                shadow-intensity="1"
                hidden>
            </model-viewer>
            
            <!-- Three.js Canvas для STL -->
            <canvas id="main-threejs" class="main-threejs" hidden></canvas>
        </div>
        <div class="viewer-controls">
            <button id="auto-rotate-btn" class="control-btn" data-active="true">
                ⏸️ Автоповорот
            </button>
            <button id="reset-camera-btn" class="control-btn">
                🎯 Сброс камеры
            </button>
        </div>
    </div>

    <!-- Three.js и загрузчики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
