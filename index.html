<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer</title>
    <meta name="theme-color" content="#007AFF">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
</head>
<body>
    <!-- Главный экран -->
    <div id="main-screen" class="screen active">
        <div class="container">
            <div class="app-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer Logo" class="logo-image">
            </div>
            
            <div id="preview-area" class="preview-area">
                <div id="preview-placeholder" class="preview-placeholder">
                    <span>ВЫБЕРИТЕ 3D МОДЕЛЬ</span>
                </div>
                
                <!-- Model Viewer для GLB/GLTF/OBJ -->
                <model-viewer id="preview-model" class="preview-model" hidden></model-viewer>
                
                <!-- Three.js Canvas для STL -->
                <canvas id="preview-threejs" class="preview-threejs" hidden></canvas>
                
                <!-- Индикатор загрузки -->
                <div id="loading-indicator" class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка модели...</div>
                    <div class="loading-progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                </div>
            </div>
            
            <input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl" hidden>
            <button id="select-file-btn" class="btn primary">Выбрать файл</button>
            <button id="open-3d-btn" class="btn secondary" disabled>Открыть в 3D</button>
            
            <!-- КНОПКА КОНВЕРТЕРА -->
            <button id="convert-btn" class="btn secondary" style="margin-top: 10px;">🔄 Конвертер</button>
            
            <!-- ПАНЕЛЬ КОНВЕРТЕРА (скрыта по умолчанию) -->
            <div id="converter-panel" style="display: none; margin-top: 20px; width: 100%; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; box-sizing: border-box;">
                <div style="display: flex; gap: 10px; justify-content: space-between; margin-bottom: 10px;">
                    <div style="flex: 1;">
                        <label style="color: white; display: block; margin-bottom: 5px;">Из:</label>
                        <select id="format-from" style="width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);">
                            <option value="glb">GLB (Binary glTF)</option>
                            <option value="gltf">GLTF (JSON glTF)</option>
                            <option value="obj">OBJ (Wavefront)</option>
                            <option value="stl">STL (Stereolithography)</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="color: white; display: block; margin-bottom: 5px;">В:</label>
                        <select id="format-to" style="width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);">
                            <option value="glb">GLB (Binary glTF)</option>
                            <option value="gltf">GLTF (JSON glTF)</option>
                            <option value="obj">OBJ (Wavefront)</option>
                            <option value="stl">STL (Stereolithography)</option>
                        </select>
                    </div>
                </div>
                
                <button id="start-convert-btn" class="btn primary" style="width: 100%; margin-top: 5px;">🔄 Конвертировать</button>
                
                <!-- Прогресс бар -->
                <div id="convert-progress-container" style="display: none; margin-top: 15px;">
                    <div style="color: white; margin-bottom: 5px;">Конвертация...</div>
                    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden;">
                        <div id="convert-progress-bar" style="width: 0%; height: 100%; background: #007AFF; transition: width 0.3s;"></div>
                    </div>
                    <div id="convert-progress-text" style="color: white; text-align: right; margin-top: 5px;">0%</div>
                </div>
                
                <!-- Ссылка на скачивание -->
                <div id="download-link-container" style="display: none; margin-top: 15px; text-align: center;">
                    <a id="download-link" href="#" style="color: #007AFF; text-decoration: underline; font-weight: bold;">📥 Скачать конвертированный файл</a>
                </div>
            </div>
            
            <div id="file-name" class="file-name"></div>
        </div>
    </div>

    <!-- Экран просмотра -->
    <div id="viewer-screen" class="screen">
        <header class="header">
            <button id="back-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 id="viewer-title" class="viewer-title"></h2>
        </header>
        <div class="viewer-container">
            <!-- Model Viewer для GLB/GLTF/OBJ -->
            <model-viewer id="main-model" class="main-model" 
                camera-controls 
                auto-rotate
                shadow-intensity="1"
                hidden>
            </model-viewer>
            
            <!-- Three.js Canvas для STL -->
            <canvas id="main-threejs" class="main-threejs" hidden></canvas>
        </div>
        <div class="viewer-controls">
            <button id="auto-rotate-btn" class="control-btn" data-active="true">
                ⏸️ Автоповорот
            </button>
            <button id="reset-camera-btn" class="control-btn">
                🎯 Сброс камеры
            </button>
        </div>
    </div>

    <!-- Three.js и загрузчики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- ЭКСПОРТЕРЫ ДЛЯ КОНВЕРТЕРА -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
