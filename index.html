<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer</title>
    <meta name="theme-color" content="#007AFF">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
    
    <style>
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .nav-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .web-frame {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            background: white;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <!-- Главный экран -->
    <div id="main-screen" class="screen active">
        <div class="container">
            <div class="app-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer Logo" class="logo-image">
            </div>
            
            <div id="preview-area" class="preview-area">
                <div id="preview-placeholder" class="preview-placeholder">
                    <span>ВЫБЕРИТЕ 3D МОДЕЛЬ</span>
                </div>
                <model-viewer id="preview-model" class="preview-model" hidden></model-viewer>
                <canvas id="preview-threejs" class="preview-threejs" hidden></canvas>
                
                <div id="loading-indicator" class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка модели...</div>
                </div>
            </div>
            
            <input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl" hidden>
            <button id="select-file-btn" class="btn primary">Выбрать файл</button>
            <button id="open-3d-btn" class="btn secondary" disabled>Открыть в 3D</button>
            <div id="file-name" class="file-name"></div>
            
            <div class="nav-buttons">
                <button id="show-converter-btn" class="nav-btn">🌐 Конвертер</button>
            </div>
        </div>
    </div>

    <!-- Экран просмотра 3D -->
    <div id="viewer-screen" class="screen">
        <div style="position: fixed; top: 0; left: 0; right: 0; height: 50px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 100;">
            <button id="back-from-viewer" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">←</button>
            <span style="color: white; margin-left: 20px; flex: 1;" id="viewer-title"></span>
        </div>
        <div style="position: fixed; top: 50px; left: 0; right: 0; bottom: 0;">
            <model-viewer id="main-model" style="width: 100%; height: 100%;" camera-controls auto-rotate shadow-intensity="1" hidden></model-viewer>
            <canvas id="main-threejs" style="width: 100%; height: 100%; display: none;"></canvas>
        </div>
        <div style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px;">
            <button id="auto-rotate-btn" style="padding: 15px 30px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-weight: 600;">⏸️ Автоповорот</button>
            <button id="reset-camera-btn" style="padding: 15px 30px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-weight: 600;">🎯 Сброс</button>
        </div>
    </div>

    <!-- Экран конвертера (iframe) -->
    <div id="converter-screen" class="screen">
        <div style="position: fixed; top: 0; left: 0; right: 0; height: 50px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 100;">
            <button id="back-from-converter" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">←</button>
            <span style="color: white; margin-left: 20px;">Web Конвертер</span>
        </div>
        <iframe id="converter-iframe" class="web-frame" src="https://poserval.github.io/3D-Model-Viewer/converter.html" sandbox="allow-same-origin allow-scripts allow-forms allow-downloads allow-popups"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <script>
        // Простая навигация между экранами
        const screens = {
            main: document.getElementById('main-screen'),
            viewer: document.getElementById('viewer-screen'),
            converter: document.getElementById('converter-screen')
        };
        
        // Навигация
        document.getElementById('show-converter-btn').onclick = () => {
            screens.main.classList.remove('active');
            screens.converter.classList.add('active');
        };
        
        document.getElementById('back-from-viewer').onclick = () => {
            screens.viewer.classList.remove('active');
            screens.main.classList.add('active');
        };
        
        document.getElementById('back-from-converter').onclick = () => {
            screens.converter.classList.remove('active');
            screens.main.classList.add('active');
        };
        
        // Обработка файлов
        const fileInput = document.getElementById('file-input');
        const selectFileBtn = document.getElementById('select-file-btn');
        const open3dBtn = document.getElementById('open-3d-btn');
        const fileName = document.getElementById('file-name');
        
        selectFileBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                open3dBtn.disabled = false;
            }
        };
        
        open3dBtn.onclick = () => {
            screens.main.classList.remove('active');
            screens.viewer.classList.add('active');
        };
    </script>
</body>
</html>
