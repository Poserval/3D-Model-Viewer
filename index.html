<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer</title>
    <meta name="theme-color" content="#007AFF">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
</head>
<body>
    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="main-screen" class="screen active">
        <div class="container">
            <div class="app-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer Logo" class="logo-image">
            </div>
            
            <div id="preview-area" class="preview-area">
                <div id="preview-placeholder" class="preview-placeholder">
                    <span>ВЫБЕРИТЕ 3D МОДЕЛЬ</span>
                </div>
                
                <!-- Model Viewer для GLB/GLTF/OBJ -->
                <model-viewer id="preview-model" class="preview-model" hidden></model-viewer>
                
                <!-- Three.js Canvas для STL -->
                <canvas id="preview-threejs" class="preview-threejs" hidden></canvas>
                
                <!-- Индикатор загрузки -->
                <div id="loading-indicator" class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка модели...</div>
                    <div class="loading-progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                </div>
            </div>
            
            <input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl" hidden>
            <button id="select-file-btn" class="btn primary">Выбрать файл</button>
            <button id="open-3d-btn" class="btn secondary" disabled>Открыть в 3D</button>
            
            <!-- КНОПКА КОНВЕРТЕРА -->
            <button id="go-to-converter-btn" class="btn secondary" style="margin-top: 10px;">🔄 Конвертер</button>
            
            <div id="file-name" class="file-name"></div>
        </div>
    </div>

    <!-- ЭКРАН ПРОСМОТРА 3D -->
    <div id="viewer-screen" class="screen">
        <header class="header">
            <button id="back-from-viewer-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 id="viewer-title" class="viewer-title"></h2>
        </header>
        <div class="viewer-container">
            <!-- Model Viewer для GLB/GLTF/OBJ -->
            <model-viewer id="main-model" class="main-model" 
                camera-controls 
                auto-rotate
                shadow-intensity="1"
                hidden>
            </model-viewer>
            
            <!-- Three.js Canvas для STL -->
            <canvas id="main-threejs" class="main-threejs" hidden></canvas>
        </div>
        <div class="viewer-controls">
            <button id="auto-rotate-btn" class="control-btn" data-active="true">
                ⏸️ Автоповорот
            </button>
            <button id="reset-camera-btn" class="control-btn">
                🎯 Сброс камеры
            </button>
        </div>
    </div>

    <!-- ЭКРАН КОНВЕРТЕРА (НОВЫЙ) -->
    <div id="converter-screen" class="screen">
        <header class="header">
            <button id="back-from-converter-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 class="viewer-title">Конвертер форматов</h2>
        </header>
        
        <div class="converter-container">
            <div class="converter-content">
                <!-- Информация о выбранном файле -->
                <div id="converter-file-info" class="converter-file-info" style="display: none;">
                    <div class="file-info-label">Выбран файл:</div>
                    <div id="converter-file-name" class="converter-file-name"></div>
                </div>
                
                <div id="converter-no-file" class="converter-no-file">
                    <p>📁 Сначала выберите файл на главном экране</p>
                    <button id="go-to-main-from-converter-btn" class="btn primary">На главный экран</button>
                </div>
                
                <div id="converter-controls" style="display: none;">
                    <div class="converter-form">
                        <div class="converter-row">
                            <div class="converter-col">
                                <label class="converter-label">Из формата:</label>
                                <select id="format-from" class="converter-select">
                                    <option value="glb">GLB (Binary glTF)</option>
                                    <option value="gltf">GLTF (JSON glTF)</option>
                                    <option value="obj">OBJ (Wavefront)</option>
                                    <option value="stl">STL (Stereolithography)</option>
                                </select>
                            </div>
                            
                            <div class="converter-arrow">→</div>
                            
                            <div class="converter-col">
                                <label class="converter-label">В формат:</label>
                                <select id="format-to" class="converter-select">
                                    <option value="glb">GLB (Binary glTF)</option>
                                    <option value="gltf">GLTF (JSON glTF)</option>
                                    <option value="obj">OBJ (Wavefront)</option>
                                    <option value="stl">STL (Stereolithography)</option>
                                </select>
                            </div>
                        </div>
                        
                        <button id="start-convert-btn" class="btn primary converter-start-btn">🔄 Конвертировать</button>
                        
                        <!-- Прогресс бар -->
                        <div id="convert-progress-container" style="display: none; margin-top: 20px;">
                            <div style="color: white; margin-bottom: 5px;">Конвертация...</div>
                            <div class="progress-bar">
                                <div id="convert-progress-bar" class="progress-fill" style="width: 0%;"></div>
                            </div>
                            <div id="convert-progress-text" style="color: white; text-align: right; margin-top: 5px;">0%</div>
                        </div>
                        
                        <!-- Ссылка на скачивание -->
                        <div id="download-link-container" style="display: none; margin-top: 20px; text-align: center;">
                            <a id="download-link" href="#" class="download-link">📥 Скачать конвертированный файл</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js и загрузчики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
