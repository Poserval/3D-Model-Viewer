<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer</title>
    <meta name="theme-color" content="#007AFF">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-app-192.png" type="image/png">
</head>
<body>
    <!-- Главный экран -->
    <div id="main-screen" class="screen active">
        <div class="container">
            <div class="app-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer Logo" class="logo-image">
            </div>
            
            <div id="preview-area" class="preview-area">
                <div id="preview-placeholder" class="preview-placeholder">
                    <span>ВЫБЕРИТЕ 3D МОДЕЛЬ</span>
                </div>
                
                <!-- Model Viewer для GLB/GLTF/OBJ -->
                <model-viewer id="preview-model" class="preview-model" hidden></model-viewer>
                
                <!-- Three.js Canvas для STL -->
                <canvas id="preview-threejs" class="preview-threejs" hidden></canvas>
                
                <!-- Индикатор загрузки -->
                <div id="loading-indicator" class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка модели...</div>
            <div class="loading-progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                </div>
            </div>
            
            <input type="file" id="file-input" accept=".glb,.gltf,.obj,.stl" hidden>
            <button id="select-file-btn" class="btn primary">Выбрать файл</button>
            <button id="open-3d-btn" class="btn secondary" disabled>Открыть в 3D</button>
            
            <!-- КНОПКА КОНВЕРТЕРА -->
            <button id="convert-btn" class="btn secondary" style="margin-top: 10px;">🔄 Конвертер</button>
            
            <div id="file-name" class="file-name"></div>

            <!-- Панель конвертера (изначально скрыта) -->
            <div id="converter-panel" class="converter-panel" style="display: none;">
                <div class="converter-header">
                    <h3>Конвертер 3D-моделей</h3>
                    <button id="close-converter" class="close-btn">×</button>
                </div>

                <div class="format-selection">
                    <div class="format-column">
                <label>Из:</label>
                <select id="source-format" class="format-select">
                    <option value="">Выберите формат</option>
            <option value="glb">GLB</option>
            <option value="gltf">GLTF</option>
            <option value="obj">OBJ</option>
            <option value="stl">STL</option>
                </select>
            </div>
            <div class="format-column">
                <label>В:</label>
                <select id="target-format" class="format-select">
            <option value="">Выберите формат</option>
            <option value="glb">GLB</option>
            <option value="gltf">GLTF</option>
            <option value="obj">OBJ</option>
            <option value="stl">STL</option>
                </select>
            </div>
                </div>

                <button id="start-conversion" class="btn primary" disabled>Конвертировать</button>

                <!-- Прогресс-бар -->
                <div id="conversion-progress" class="progress-container" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">0%</div>
                </div>

                <!-- Результаты конвертации -->
                <div id="conversion-results" class="conversion-results" style="display: none;">
            <div class="result-actions">
                <button id="save-file" class="btn secondary">Сохранить</button>
                <button id="share-file" class="btn secondary">Поделиться</button>
            </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран просмотра -->
    <div id="viewer-screen" class="screen">
        <header class="header">
            <button id="back-btn" class="back-btn">← Назад</button>
            <div class="header-logo">
                <img src="icons/logo-header.png" alt="3D Model Viewer" class="logo-image-small">
            </div>
            <h2 id="viewer-title" class="viewer-title"></h2>
        </header>
        <div class="viewer-container">
            <!-- Model Viewer для GLB/GLTF/OBJ -->
            <model-viewer id="main-model" class="main-model"
                camera-controls
                auto-rotate
                shadow-intensity="1"
                hidden>
            </model-viewer>
            
            <!-- Three.js Canvas для STL -->
            <canvas id="main-threejs" class="main-threejs" hidden></canvas>
        </div>
        <div class="viewer-controls">
            <button id="auto-rotate-btn" class="control-btn" data-active="true">
                ⏸️ Автоповорот
            </button>
            <button id="reset-camera-btn" class="control-btn">
                🎯 Сброс камеры
            </button>
        </div>
    </div>

    <!-- Three.js и загрузчики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
