<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Конвертер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 24px;
        }

        .file-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        .file-area:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .file-info {
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }

        .format-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .format-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
        }

        .convert-btn {
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #C850C0);
            width: 0%;
            transition: width 0.3s ease;
        }

        .result-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .download-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 3D Конвертер</h1>
        
        <div class="file-area" id="fileArea">
            📁 Нажмите для выбора файла<br>
            <small>Поддерживаются: STL, OBJ, GLB, GLTF</small>
            <div class="file-info" id="fileInfo">Ничего не выбрано</div>
        </div>
        <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">
        
        <div class="format-row">
            <select id="fromFormat" class="format-select">
                <option value="stl">STL</option>
                <option value="obj">OBJ</option>
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
            </select>
            <span style="color: white; font-size: 24px;">→</span>
            <select id="toFormat" class="format-select">
                <option value="stl">STL</option>
                <option value="obj">OBJ</option>
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
            </select>
        </div>
        
        <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="result-area" id="resultArea">
            <div id="resultInfo"></div>
            <button class="download-btn" id="downloadBtn">📥 Скачать полученный файл</button>
        </div>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        let currentFile = null;
        let convertedBlob = null;

        const fileArea = document.getElementById('fileArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const resultArea = document.getElementById('resultArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');

        fileArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            currentFile = file;
            fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            errorMsg.textContent = '';
            resultArea.style.display = 'none';
        }

        convertBtn.addEventListener('click', async () => {
            if (!currentFile) {
                errorMsg.textContent = 'Выберите файл';
                return;
            }
            
            convertBtn.disabled = true;
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            errorMsg.textContent = '';
            
            try {
                await convertModel();
            } catch (err) {
                errorMsg.textContent = 'Ошибка: ' + err.message;
            } finally {
                convertBtn.disabled = false;
                progressBar.style.display = 'none';
            }
        });

        async function convertModel() {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        progressFill.style.width = '50%';
                        await new Promise(r => setTimeout(r, 200));
                        
                        // Симуляция конвертации
                        progressFill.style.width = '100%';
                        
                        // Создаём заглушку (в реальном проекте здесь должна быть логика)
                        const outputBlob = new Blob([currentFile], { type: 'application/octet-stream' });
                        convertedBlob = outputBlob;
                        
                        const resultInfo = document.getElementById('resultInfo');
                        resultInfo.innerHTML = `
                            <strong>Было:</strong> ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB)<br>
                            <strong>Стало:</strong> converted.${toFormat.value} (${(outputBlob.size / 1024).toFixed(1)} KB)
                        `;
                        resultArea.style.display = 'block';
                        
                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                reader.readAsArrayBuffer(currentFile);
            });
        }

        downloadBtn.addEventListener('click', () => {
            if (!convertedBlob) return;
            const url = URL.createObjectURL(convertedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted.${toFormat.value}`;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
