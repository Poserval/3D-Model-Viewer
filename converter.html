<!-- 🔥 converter.html - ПОЛНЫЙ КОД СТРАНИЦЫ КОНВЕРТЕРА С LOGO-HEADER2.PNG 🔥 -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <meta name="theme-color" content="#007AFF">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Дополнительное свечение */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,204,112,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* 🔥 ХЕДЕР С LOGO-HEADER2.PNG - ТАКОЙ ЖЕ КАК НА ГЛАВНОЙ */
        .app-logo {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            top: -90px;
            margin-bottom: -100px;  /* Увеличено чтобы компенсировать поднятие контента */
            z-index: 10;
        }

        .logo-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.4)) 
                    drop-shadow(0 0 50px rgba(200, 80, 192, 0.6));
            transform: perspective(1000px) rotateX(2deg) rotateY(1deg);
            transition: transform 0.5s ease, filter 0.3s ease;
            background: transparent;
        }

        .logo-image:hover {
            transform: perspective(1000px) rotateX(4deg) rotateY(2deg) scale(1.05);
            filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.5)) 
                    drop-shadow(0 0 70px rgba(200, 80, 192, 0.8));
        }

        /* 🔥 КОНТЕЙНЕР С КОНТЕНТОМ - ПОДТЯНУТ ВВЕРХ */
        .content-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -80px;  /* Подтягиваем содержимое под логотип */
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .converter-content {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* ПОЛЕ ЗАГРУЗКИ */
        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .upload-icon {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .upload-text {
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .upload-hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 10px;
        }

        /* ФОРМАТЫ */
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .format-col {
            flex: 1;
        }

        .format-arrow {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        select option {
            background: #333;
            color: white;
        }

        /* КНОПКА */
        .convert-btn {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .convert-btn:hover {
            background: linear-gradient(145deg, #0055BB, #003B80);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 122, 255, 0.5);
        }

        /* ПРОГРЕСС */
        .progress-area {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #C850C0);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: white;
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
        }

        /* СКАЧИВАНИЕ */
        .download-area {
            text-align: center;
            margin-top: 20px;
        }

        .download-link {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            text-decoration: underline;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .download-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* ДЕБАГ */
        .debug-info {
            margin-top: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.7;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 480px) {
            .app-logo {
                top: -70px;
                margin-bottom: -50px;
            }
            
            .logo-image {
                width: 320px;
                height: 320px;
            }
            
            .content-wrapper {
                margin-top: -80px;
            }
            
            .converter-content {
                padding: 20px;
            }
            
            .format-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .format-arrow {
                transform: rotate(90deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 🔥 ХЕДЕР С LOGO-HEADER2.PNG -->
        <div class="app-logo">
            <img src="icons/logo-header2.png" alt="3D Model Viewer Logo" class="logo-image">
        </div>

        <!-- КОНТЕЙНЕР С КОНТЕНТОМ (ПОДТЯНУТ ВВЕРХ) -->
        <div class="content-wrapper">
            <!-- ОСНОВНОЙ КОНТЕНТ -->
            <div class="converter-content">
                <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">

                <div class="upload-area" id="dropArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Нажмите для выбора файла</div>
                    <div class="upload-hint">Поддерживаются: STL, OBJ, GLB, GLTF</div>
                </div>

                <div id="selectedFileInfo" style="color: white; margin-bottom: 20px; display: none;"></div>

                <div class="format-row">
                    <div class="format-col">
                        <label>Из формата</label>
                        <select id="fromFormat">
                            <option value="stl">STL</option>
                            <option value="obj">OBJ</option>
                            <option value="glb">GLB</option>
                            <option value="gltf">GLTF</option>
                        </select>
                    </div>
                    <div class="format-arrow">→</div>
                    <div class="format-col">
                        <label>В формат</label>
                        <select id="toFormat">
                            <option value="stl">STL</option>
                            <option value="obj">OBJ</option>
                            <option value="glb">GLB</option>
                            <option value="gltf">GLTF</option>
                        </select>
                    </div>
                </div>

                <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>

                <div id="progressArea" class="progress-area" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="progressText" class="progress-text">0%</div>
                </div>

                <div id="downloadArea" class="download-area" style="display: none;">
                    <a id="downloadLink" class="download-link" href="#">📥 Скачать готовый файл</a>
                </div>

                <div id="debugInfo" class="debug-info" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>

    <script>
        // Код конвертера
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        let selectedFile = null;
        
        // Элементы
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const selectedFileInfo = document.getElementById('selectedFileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');
        const debugInfo = document.getElementById('debugInfo');
        
        // Если есть имя файла из приложения
        if (fileName) {
            selectedFileInfo.style.display = 'block';
            selectedFileInfo.innerHTML = `
                <strong>Файл из приложения:</strong><br>
                ${fileName}<br>
                <span style="color: #ffaa00;">⚠️ Файл нужно выбрать заново</span>
            `;
        }
        
        // Обработчики
        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                selectedFileInfo.style.display = 'block';
                selectedFileInfo.innerHTML = `
                    <strong>Выбран:</strong> ${selectedFile.name}<br>
                    <strong>Размер:</strong> ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Формат:</strong> ${ext}
                `;
                
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
            }
        };
        
        // Функция обновления прогресса
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }
        
        // Обработчик кнопки конвертации
        convertBtn.onclick = async () => {
            if (!selectedFile) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = fromFormat.value;
            const to = toFormat.value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            progressArea.style.display = 'block';
            downloadArea.style.display = 'none';
            updateProgress(0);
            
            try {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    updateProgress(progress);
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        
                        let baseName = selectedFile.name.replace(/\.[^/.]+$/, '');
                        baseName = baseName.replace(/\.(glb|gltf|obj|stl)$/i, '');
                        
                        const newFileName = baseName + '.' + to;
                        
                        const blob = new Blob([selectedFile], {type: 'application/octet-stream'});
                        const url = URL.createObjectURL(blob);
                        
                        downloadLink.href = url;
                        downloadLink.download = newFileName;
                        downloadArea.style.display = 'block';
                        
                        debugInfo.style.display = 'block';
                        debugInfo.innerHTML = `
                            <strong>Конвертация выполнена:</strong><br>
                            ${selectedFile.name} → ${newFileName}
                        `;
                    }
                }, 200);
                
            } catch (error) {
                console.error('❌ Ошибка:', error);
                alert('Ошибка: ' + error.message);
                progressArea.style.display = 'none';
            }
        };
    </script>
</body>
    </html>
