<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Конвертер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 24px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .file-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        .file-area:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .file-info {
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }

        .format-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .format-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        .convert-btn {
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #C850C0);
            width: 0%;
            transition: width 0.3s ease;
        }

        .result-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .download-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .format-select {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 3D Конвертер</h1>
        
        <div class="file-area" id="fileArea">
            📁 Нажмите для выбора файла<br>
            <small>Поддерживаются: STL, OBJ, GLB, GLTF</small>
            <div class="file-info" id="fileInfo">Ничего не выбрано</div>
        </div>
        <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">
        
        <div class="format-row">
            <select id="fromFormat" class="format-select">
                <option value="stl">STL</option>
                <option value="obj">OBJ</option>
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
            </select>
            <span style="color: white; font-size: 24px;">→</span>
            <select id="toFormat" class="format-select">
                <option value="stl">STL</option>
                <option value="obj">OBJ</option>
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
            </select>
        </div>
        
        <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="result-area" id="resultArea">
            <div id="resultInfo"></div>
            <button class="download-btn" id="downloadBtn">📥 Скачать полученный файл</button>
        </div>
        <div id="errorMsg" class="error"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        let currentFile = null;
        let currentModel = null;
        let convertedBlob = null;

        const fileArea = document.getElementById('fileArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const resultArea = document.getElementById('resultArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');

        fileArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);

        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            currentFile = file;
            const ext = file.name.split('.').pop().toLowerCase();
            fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            
            // Автоматически выбираем формат из файла
            if (ext === 'stl') fromFormat.value = 'stl';
            else if (ext === 'obj') fromFormat.value = 'obj';
            else if (ext === 'glb') fromFormat.value = 'glb';
            else if (ext === 'gltf') fromFormat.value = 'gltf';
            
            errorMsg.textContent = '';
            resultArea.style.display = 'none';
        }

        convertBtn.addEventListener('click', async () => {
            if (!currentFile) {
                errorMsg.textContent = 'Выберите файл';
                return;
            }
            
            convertBtn.disabled = true;
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            errorMsg.textContent = '';
            
            try {
                await convertModel();
            } catch (err) {
                errorMsg.textContent = 'Ошибка конвертации: ' + err.message;
                console.error(err);
            } finally {
                convertBtn.disabled = false;
                progressBar.style.display = 'none';
            }
        });

        async function convertModel() {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        progressFill.style.width = '30%';
                        const arrayBuffer = e.target.result;
                        
                        // Загружаем модель
                        const scene = new THREE.Scene();
                        let model = null;
                        
                        if (fromFormat.value === 'stl') {
                            const loader = new THREE.STLLoader();
                            const geometry = loader.parse(arrayBuffer);
                            model = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial());
                        } else if (fromFormat.value === 'obj') {
                            const loader = new THREE.OBJLoader();
                            const text = new TextDecoder().decode(arrayBuffer);
                            model = loader.parse(text);
                        } else if (fromFormat.value === 'glb' || fromFormat.value === 'gltf') {
                            const loader = new THREE.GLTFLoader();
                            const result = await new Promise((res, rej) => {
                                loader.parse(arrayBuffer, '', res, rej);
                            });
                            model = result.scene;
                        }
                        
                        progressFill.style.width = '60%';
                        currentModel = model;
                        scene.add(model);
                        
                        // Экспортируем
                        let outputBlob = null;
                        const filename = `converted.${toFormat.value}`;
                        
                        if (toFormat.value === 'stl') {
                            outputBlob = exportToSTL(model);
                        } else if (toFormat.value === 'obj') {
                            outputBlob = exportToOBJ(model);
                        } else {
                            throw new Error('GLB/GLTF экспорт требует дополнительных библиотек. Пока поддерживается STL и OBJ');
                        }
                        
                        progressFill.style.width = '100%';
                        convertedBlob = outputBlob;
                        
                        const resultInfo = document.getElementById('resultInfo');
                        resultInfo.innerHTML = `
                            <strong>Было:</strong> ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB)<br>
                            <strong>Стало:</strong> ${filename} (${(outputBlob.size / 1024).toFixed(1)} KB)
                        `;
                        resultArea.style.display = 'block';
                        
                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                reader.readAsArrayBuffer(currentFile);
            });
        }

        function exportToSTL(model) {
            const geometry = extractGeometry(model);
            const stlString = generateSTL(geometry);
            return new Blob([stlString], { type: 'application/vnd.ms-pkistl' });
        }

        function exportToOBJ(model) {
            const geometry = extractGeometry(model);
            const objString = generateOBJ(geometry);
            return new Blob([objString], { type: 'text/plain' });
        }

        function extractGeometry(model) {
            let geometry = null;
            model.traverse(child => {
                if (child.isMesh && !geometry) {
                    geometry = child.geometry;
                }
            });
            if (!geometry) throw new Error('Не найдена геометрия модели');
            return geometry;
        }

        function generateSTL(geometry) {
            const positions = geometry.attributes.position.array;
            const indices = geometry.index.array;
            let stl = 'solid model\n';
            
            for (let i = 0; i < indices.length; i += 3) {
                const i1 = indices[i];
                const i2 = indices[i+1];
                const i3 = indices[i+2];
                const v1 = new THREE.Vector3(positions[i1*3], positions[i1*3+1], positions[i1*3+2]);
                const v2 = new THREE.Vector3(positions[i2*3], positions[i2*3+1], positions[i2*3+2]);
                const v3 = new THREE.Vector3(positions[i3*3], positions[i3*3+1], positions[i3*3+2]);
                
                const normal = new THREE.Vector3().crossVectors(
                    new THREE.Vector3().subVectors(v2, v1),
                    new THREE.Vector3().subVectors(v3, v1)
                ).normalize();
                
                stl += `facet normal ${normal.x} ${normal.y} ${normal.z}\n`;
                stl += `  outer loop\n`;
                stl += `    vertex ${v1.x} ${v1.y} ${v1.z}\n`;
                stl += `    vertex ${v2.x} ${v2.y} ${v2.z}\n`;
                stl += `    vertex ${v3.x} ${v3.y} ${v3.z}\n`;
                stl += `  endloop\n`;
                stl += `endfacet\n`;
            }
            stl += 'endsolid model\n';
            return stl;
        }

        function generateOBJ(geometry) {
            const positions = geometry.attributes.position.array;
            const indices = geometry.index.array;
            let obj = '';
            
            for (let i = 0; i < positions.length; i += 3) {
                obj += `v ${positions[i]} ${positions[i+1]} ${positions[i+2]}\n`;
            }
            
            for (let i = 0; i < indices.length; i += 3) {
                obj += `f ${indices[i]+1} ${indices[i+1]+1} ${indices[i+2]+1}\n`;
            }
            
            return obj;
        }

        downloadBtn.addEventListener('click', () => {
            if (!convertedBlob) return;
            const url = URL.createObjectURL(convertedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted.${toFormat.value}`;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
