<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .converter-box {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .file-input-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .format-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
        }
        
        select option {
            background: #333;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #0056CC;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #007AFF;
            transition: width 0.3s;
        }
        
        .download-link {
            display: block;
            text-align: center;
            color: #007AFF;
            text-decoration: underline;
            font-weight: bold;
            padding: 10px;
        }
        
        .selected-file {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="converter-box">
        <h2>🔄 Конвертер 3D форматов</h2>
        
        <input type="file" id="fileInput" accept=".glb,.gltf,.obj,.stl,.3ds" style="display: none;">
        
        <div class="file-input-area" id="dropArea">
            <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
            <div>Нажмите для выбора файла</div>
            <div style="font-size: 12px; opacity: 0.7; margin-top: 10px;">Поддерживаются: GLB, GLTF, OBJ, STL, 3DS</div>
        </div>
        
        <div id="selectedFileInfo" class="selected-file" style="display: none;"></div>
        
        <div class="format-selector">
            <select id="fromFormat">
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
                <option value="obj">OBJ</option>
                <option value="stl">STL</option>
                <option value="3ds">3DS</option>
            </select>
            <span style="font-size: 24px;">→</span>
            <select id="toFormat">
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
                <option value="obj">OBJ</option>
                <option value="stl">STL</option>
            </select>
        </div>
        
        <button id="convertBtn">🔄 Конвертировать</button>
        
        <div id="progressArea" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin: 10px 0;">0%</div>
        </div>
        
        <div id="downloadArea" style="display: none;">
            <a id="downloadLink" class="download-link">📥 Скачать готовый файл</a>
        </div>
    </div>

    <script>
        // Простая имитация конвертации
        let selectedFile = null;
        
        document.getElementById('dropArea').onclick = () => {
            document.getElementById('fileInput').click();
        };
        
        document.getElementById('fileInput').onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('selectedFileInfo').style.display = 'block';
                document.getElementById('selectedFileInfo').innerHTML = `
                    <strong>Выбран:</strong> ${selectedFile.name}<br>
                    <strong>Размер:</strong> ${(selectedFile.size / 1024).toFixed(1)} KB
                `;
            }
        };
        
        document.getElementById('convertBtn').onclick = () => {
            if (!selectedFile) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = document.getElementById('fromFormat').value;
            const to = document.getElementById('toFormat').value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            // Показываем прогресс
            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('downloadArea').style.display = 'none';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    // Создаем ссылку на скачивание
                    setTimeout(() => {
                        document.getElementById('downloadArea').style.display = 'block';
                        const fileName = selectedFile.name.replace(/\.[^/.]+$/, '') + '.' + to;
                        document.getElementById('downloadLink').href = URL.createObjectURL(selectedFile);
                        document.getElementById('downloadLink').download = fileName;
                    }, 500);
                }
            }, 200);
        };
    </script>
</body>
</html>
