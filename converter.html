<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .converter-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        
        .file-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .file-area:hover { background: rgba(255, 255, 255, 0.25); }
        .file-area.dragover { background: rgba(255, 255, 255, 0.3); border-color: #007AFF; }
        .file-icon { font-size: 48px; margin-bottom: 10px; }
        
        .selected-file {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .format-col { flex: 1; }
        .format-arrow { font-size: 24px; opacity: 0.7; }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.9; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
        }
        
        select option { background: #333; }
        
        button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #0056CC;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #007AFF;
            transition: width 0.3s;
        }
        
        .download-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-decoration: underline;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .download-link:hover { background: rgba(255, 255, 255, 0.2); }
        
        .footer-note { text-align: center; font-size: 12px; opacity: 0.6; margin-top: 20px; }
        
        @media (max-width: 480px) {
            .format-row { flex-direction: column; gap: 10px; }
            .format-arrow { transform: rotate(90deg); }
        }
        
        /* Стили для загрузки WASM */
        .loading-message {
            text-align: center;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .loading-message .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <h1>🔄 Конвертер 3D форматов</h1>
        
        <div id="loadingLibrary" style="display: none;">
            <div class="loading-message">
                <span class="spinner"></span>
                Загрузка библиотеки конвертации...
            </div>
        </div>
        
        <input type="file" id="fileInput" accept=".glb,.gltf,.obj,.stl,.3ds" style="display: none;">
        
        <div class="file-area" id="dropArea">
            <div class="file-icon">📁</div>
            <div>Нажмите для выбора файла</div>
            <div style="font-size: 12px; opacity: 0.7; margin-top: 10px;">
                Поддерживаются: GLB, GLTF, OBJ, STL, 3DS
            </div>
        </div>
        
        <div id="selectedFileInfo" class="selected-file" style="display: none;"></div>
        
        <div class="format-row">
            <div class="format-col">
                <label>Из формата</label>
                <select id="fromFormat">
                    <option value="glb">GLB (Binary glTF)</option>
                    <option value="gltf">GLTF (JSON glTF)</option>
                    <option value="obj">OBJ (Wavefront)</option>
                    <option value="stl">STL (Stereolithography)</option>
                    <option value="3ds">3DS (3D Studio)</option>
                </select>
            </div>
            <div class="format-arrow">→</div>
            <div class="format-col">
                <label>В формат</label>
                <select id="toFormat">
                    <option value="glb">GLB (Binary glTF)</option>
                    <option value="gltf">GLTF (JSON glTF)</option>
                    <option value="obj">OBJ (Wavefront)</option>
                    <option value="stl">STL (Stereolithography)</option>
                </select>
            </div>
        </div>
        
        <button id="convertBtn" disabled>🔄 Загрузка библиотеки...</button>
        
        <div id="progressArea" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin: 10px 0;">0%</div>
        </div>
        
        <div id="downloadArea" style="display: none;">
            <a id="downloadLink" class="download-link">📥 Скачать готовый файл</a>
        </div>
        
        <div id="debugInfo" style="margin-top: 10px; font-size: 12px; opacity: 0.7; display: none;"></div>
        
        <div class="footer-note">
            Конвертация выполняется в браузере с помощью MeshFlow [citation:1]
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // Импортируем MeshFlow
        import createAssimp from 'https://cdn.jsdelivr.net/npm/@sruim/mesh-flow@0.5.0/dist/mesh-flow.min.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        let selectedFile = null;
        let assimp = null;
        let libraryLoaded = false;
        
        // Элементы
        const loadingLibrary = document.getElementById('loadingLibrary');
        const convertBtn = document.getElementById('convertBtn');
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFileInfo = document.getElementById('selectedFileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');
        const debugInfo = document.getElementById('debugInfo');
        
        // Загружаем MeshFlow
        async function loadLibrary() {
            loadingLibrary.style.display = 'block';
            convertBtn.disabled = true;
            convertBtn.textContent = '⏳ Загрузка библиотеки...';
            
            try {
                // Пытаемся загрузить MeshFlow
                assimp = await createAssimp();
                libraryLoaded = true;
                loadingLibrary.style.display = 'none';
                convertBtn.disabled = false;
                convertBtn.textContent = '🔄 Конвертировать';
                console.log('✅ MeshFlow загружен');
                
                if (fileName) {
                    selectedFileInfo.style.display = 'block';
                    selectedFileInfo.innerHTML = `
                        <strong>Файл из приложения:</strong><br>
                        ${fileName}<br>
                        <span style="color: #ffaa00;">⚠️ Файл нужно выбрать заново</span>
                    `;
                }
            } catch (error) {
                console.error('❌ Ошибка загрузки MeshFlow:', error);
                loadingLibrary.style.display = 'none';
                convertBtn.disabled = false;
                convertBtn.textContent = '🔄 Конвертировать (без библиотеки)';
                alert('Не удалось загрузить библиотеку конвертации. Будет использовано тестовое копирование.');
            }
        }
        
        // Обработчики
        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                selectedFileInfo.style.display = 'block';
                selectedFileInfo.innerHTML = `
                    <strong>Выбран:</strong> ${selectedFile.name}<br>
                    <strong>Размер:</strong> ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Формат:</strong> ${ext}
                `;
                
                // Автоматически выбираем формат в select
                if (fromFormat.querySelector(`option[value="${ext}"]`)) {
                    fromFormat.value = ext;
                }
            }
        };
        
        // Поддержка drag & drop
        dropArea.ondragover = (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        };
        
        dropArea.ondragleave = () => {
            dropArea.classList.remove('dragover');
        };
        
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                selectedFile = file;
                const ext = file.name.split('.').pop().toLowerCase();
                selectedFileInfo.style.display = 'block';
                selectedFileInfo.innerHTML = `
                    <strong>Выбран:</strong> ${file.name}<br>
                    <strong>Размер:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Формат:</strong> ${ext}
                `;
                if (fromFormat.querySelector(`option[value="${ext}"]`)) {
                    fromFormat.value = ext;
                }
            }
        };
        
        // Функция обновления прогресса
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }
        
        // Функция реальной конвертации через MeshFlow
        async function convertWithMeshFlow(file, targetFormat) {
            return new Promise(async (resolve, reject) => {
                try {
                    // Читаем файл как ArrayBuffer
                    const arrayBuffer = await file.arrayBuffer();
                    updateProgress(20);
                    
                    // Создаем объект с данными файла
                    const fileData = {
                        name: file.name,
                        data: arrayBuffer
                    };
                    
                    updateProgress(40);
                    
                    // Конвертируем
                    console.log(`Конвертация в ${targetFormat}...`);
                    const result = await assimp.convert(fileData, targetFormat);
                    updateProgress(80);
                    
                    // Получаем результат
                    const outputBuffer = result;
                    updateProgress(100);
                    
                    resolve(outputBuffer);
                } catch (error) {
                    console.error('Ошибка конвертации:', error);
                    reject(error);
                }
            });
        }
        
        // Обработчик кнопки конвертации
        convertBtn.onclick = async () => {
            if (!selectedFile) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = fromFormat.value;
            const to = toFormat.value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            // Показываем прогресс
            progressArea.style.display = 'block';
            downloadArea.style.display = 'none';
            updateProgress(0);
            
            try {
                let resultBuffer;
                
                if (libraryLoaded && assimp) {
                    // Реальная конвертация через MeshFlow
                    resultBuffer = await convertWithMeshFlow(selectedFile, to);
                } else {
                    // Тестовая конвертация (для отладки)
                    console.warn('Используется тестовая конвертация');
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 10;
                        updateProgress(progress);
                        if (progress >= 100) {
                            clearInterval(interval);
                            setTimeout(() => {
                                const blob = new Blob([selectedFile], {type: 'application/octet-stream'});
                                resultBuffer = blob;
                            }, 500);
                        }
                    }, 200);
                    return;
                }
                
                // Создаем имя файла
                let baseName = selectedFile.name;
                // Удаляем расширение один раз
                baseName = baseName.replace(/\.[^/.]+$/, '');
                // Убираем возможные лишние расширения
                baseName = baseName.replace(/\.(glb|gltf|obj|stl|3ds)$/i, '');
                
                const newFileName = baseName + '.' + to;
                
                // Создаем blob и ссылку
                const blob = new Blob([resultBuffer], {type: 'application/octet-stream'});
                const url = URL.createObjectURL(blob);
                
                downloadLink.href = url;
                downloadLink.download = newFileName;
                downloadArea.style.display = 'block';
                
                // Отладочная информация
                debugInfo.style.display = 'block';
                debugInfo.innerHTML = `
                    <strong>Конвертация выполнена:</strong><br>
                    ${selectedFile.name} → ${newFileName}<br>
                    Размер результата: ${(blob.size / 1024 / 1024).toFixed(2)} MB
                `;
                
                console.log('✅ Конвертация завершена:', newFileName);
                
            } catch (error) {
                console.error('❌ Ошибка конвертации:', error);
                alert('Ошибка конвертации: ' + error.message);
                progressArea.style.display = 'none';
            }
        };
        
        // Загружаем библиотеку при старте
        loadLibrary();
    </script>
</body>
</html>
