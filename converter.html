<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3DViewer - Конвертер</title>
    <meta name="theme-color" content="#007AFF">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .app-logo { text-align: center; margin-bottom: -40px; }
        .logo-image { width: 200px; height: 200px; object-fit: contain; }
        .converter-content {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            padding: 25px;
            backdrop-filter: blur(15px);
        }
        .upload-area {
            background: rgba(255,255,255,0.2);
            border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-icon { font-size: 48px; }
        .upload-text { color: white; font-size: 18px; font-weight: 600; }
        .upload-hint { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 8px; }
        .file-info {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .format-select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        .format-select option { background: #333; color: white; }
        .arrow { color: white; font-size: 24px; text-align: center; }
        .convert-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            margin-bottom: 20px;
        }
        .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-area { margin-bottom: 20px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.3s; }
        .progress-text { color: white; text-align: center; margin-top: 5px; font-size: 13px; }
        .result-area { margin-bottom: 20px; display: none; }
        .result-info {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .download-link {
            display: block;
            padding: 12px;
            background: #4CAF50;
            border-radius: 12px;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #000000cc;
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            transition: 0.2s;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="container">
    <div class="app-logo">
        <img src="icons/logo-header2.png" alt="3D Model Viewer Logo" class="logo-image">
    </div>
    <div class="converter-content">
        <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">
        
        <div class="upload-area" id="dropArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Нажмите для выбора файла</div>
            <div class="upload-hint">Поддерживаются: STL, OBJ, GLB, GLTF</div>
        </div>
        
        <div id="fileInfo" class="file-info">
            <div id="fileInfoContent" class="placeholder-text">Ничего не выбрано</div>
        </div>
        
        <div class="format-row">
            <div class="format-col">
                <select id="fromFormat" class="format-select">
                    <option value="stl">STL</option>
                    <option value="obj">OBJ</option>
                    <option value="glb">GLB</option>
                    <option value="gltf">GLTF</option>
                </select>
            </div>
            <div class="arrow">→</div>
            <div class="format-col">
                <select id="toFormat" class="format-select">
                    <option value="stl">STL</option>
                    <option value="obj">OBJ</option>
                    <option value="glb">GLB</option>
                    <option value="gltf">GLTF</option>
                </select>
            </div>
        </div>
        
        <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>
        
        <div id="progressArea" class="progress-area">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div id="resultArea" class="result-area">
            <div id="resultInfo" class="result-info">
                <div class="result-row">
                    <div class="result-item"><span class="result-label">Было:</span><span class="result-value" id="originalFileDetails"></span></div>
                    <div class="result-item"><span class="result-label">Стало:</span><span class="result-value" id="convertedFileDetails"></span></div>
                </div>
            </div>
        </div>
        
        <div id="downloadArea" class="download-area">
            <a id="downloadLink" class="download-link">📥 Скачать полученный файл</a>
        </div>
        
        <a href="index.html" class="back-link">← На главную</a>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>

<script>
    // DOM элементы
    const fileInput = document.getElementById('fileInput');
    const dropArea = document.getElementById('dropArea');
    const fileInfoContent = document.getElementById('fileInfoContent');
    const fromFormat = document.getElementById('fromFormat');
    const toFormat = document.getElementById('toFormat');
    const convertBtn = document.getElementById('convertBtn');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultArea = document.getElementById('resultArea');
    const originalFileDetails = document.getElementById('originalFileDetails');
    const convertedFileDetails = document.getElementById('convertedFileDetails');
    const downloadLink = document.getElementById('downloadLink');
    const toastEl = document.getElementById('toastMsg');
    
    let selectedFile = null;
    let currentBlob = null;
    let currentFileName = null;
    let originalFileSize = 0;
    
    function showMessage(msg, isError) {
        toastEl.textContent = msg;
        toastEl.style.background = isError ? '#b91c1ccc' : '#0f172acc';
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2800);
    }
    
    function formatSize(bytes) {
        if (!bytes) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }
    
    function updateProgress(percent, text) {
        progressFill.style.width = percent + '%';
        progressText.textContent = text || (percent + '%');
    }
    
    // ========== ВЫБОР ФАЙЛА (РАБОТАЕТ) ==========
    dropArea.onclick = () => fileInput.click();
    
    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            selectedFile = e.target.files[0];
            const ext = selectedFile.name.split('.').pop().toLowerCase();
            const sizeMB = (selectedFile.size / 1024 / 1024).toFixed(2);
            originalFileSize = selectedFile.size;
            
            fileInfoContent.innerHTML = `
                <div class="file-name">${selectedFile.name}</div>
                <div class="file-details">
                    <span>📦 ${sizeMB} MB</span>
                    <span>🏷️ ${ext.toUpperCase()}</span>
                </div>
            `;
            
            if (ext === 'stl') fromFormat.value = 'stl';
            else if (ext === 'obj') fromFormat.value = 'obj';
            else if (ext === 'glb') fromFormat.value = 'glb';
            else if (ext === 'gltf') fromFormat.value = 'gltf';
            
            showMessage('✅ Файл выбран: ' + selectedFile.name);
        }
    };
    
    // Drag & drop
    dropArea.ondragover = (e) => { e.preventDefault(); dropArea.style.background = 'rgba(255,255,255,0.25)'; };
    dropArea.ondragleave = () => { dropArea.style.background = 'rgba(255,255,255,0.2)'; };
    dropArea.ondrop = (e) => {
        e.preventDefault();
        dropArea.style.background = 'rgba(255,255,255,0.2)';
        const file = e.dataTransfer.files[0];
        if (file) {
            selectedFile = file;
            const ext = file.name.split('.').pop().toLowerCase();
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            fileInfoContent.innerHTML = `<div class="file-name">${file.name}</div><div class="file-details"><span>📦 ${sizeMB} MB</span><span>🏷️ ${ext.toUpperCase()}</span></div>`;
            if (ext === 'stl') fromFormat.value = 'stl';
            else if (ext === 'obj') fromFormat.value = 'obj';
            else if (ext === 'glb') fromFormat.value = 'glb';
            else if (ext === 'gltf') fromFormat.value = 'gltf';
            showMessage('✅ Файл выбран: ' + file.name);
        }
    };
    
    // ========== ЛОКАЛЬНАЯ КОНВЕРТАЦИЯ (БЕЗ СЕРВЕРА) ==========
    async function convertFile() {
        if (!selectedFile) {
            showMessage('❌ Сначала выберите файл', true);
            return;
        }
        
        const from = fromFormat.value;
        const to = toFormat.value;
        
        if (from === to) {
            showMessage('⚠️ Нельзя конвертировать в тот же формат', true);
            return;
        }
        
        resultArea.style.display = 'none';
        downloadLink.style.display = 'none';
        progressArea.style.display = 'block';
        updateProgress(0, 'Подготовка...');
        
        try {
            updateProgress(20, 'Чтение файла...');
            const arrayBuffer = await selectedFile.arrayBuffer();
            
            updateProgress(40, 'Загрузка геометрии...');
            
            let scene = new THREE.Scene();
            
            if (from === 'stl') {
                const loader = new THREE.STLLoader();
                const geometry = loader.parse(arrayBuffer);
                const material = new THREE.MeshStandardMaterial({ color: 0x66ccff });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
            } else if (from === 'obj') {
                const text = new TextDecoder().decode(arrayBuffer);
                const loader = new THREE.OBJLoader();
                const obj = loader.parse(text);
                scene.add(obj);
            } else {
                showMessage('❌ Формат ' + from.toUpperCase() + ' пока не поддерживается для локальной конвертации', true);
                progressArea.style.display = 'none';
                convertBtn.disabled = false;
                return;
            }
            
            scene.add(new THREE.AmbientLight(0xffffff));
            scene.add(new THREE.DirectionalLight(0xffffff, 1));
            
            updateProgress(70, 'Экспорт в ' + to.toUpperCase() + '...');
            
            let blob;
            if (to === 'stl') {
                const exporter = new THREE.STLExporter();
                const data = exporter.parse(scene, { binary: false });
                blob = new Blob([data], { type: 'text/plain' });
            } else if (to === 'obj') {
                const exporter = new THREE.OBJExporter();
                const data = exporter.parse(scene);
                blob = new Blob([data], { type: 'text/plain' });
            } else if (to === 'glb' || to === 'gltf') {
                const exporter = new THREE.GLTFExporter();
                const data = await new Promise((resolve, reject) => {
                    exporter.parse(scene, resolve, reject, { binary: to === 'glb' });
                });
                blob = new Blob([data], { type: to === 'glb' ? 'application/octet-stream' : 'application/json' });
            } else {
                throw new Error('Формат не поддерживается');
            }
            
            updateProgress(100, 'Готово!');
            
            const baseName = selectedFile.name.replace(/\.[^/.]+$/, '');
            currentFileName = `${baseName}_converted.${to}`;
            currentBlob = blob;
            
            originalFileDetails.innerHTML = `${selectedFile.name} · ${formatSize(originalFileSize)}`;
            convertedFileDetails.innerHTML = `${currentFileName} · ${formatSize(blob.size)}`;
            
            resultArea.style.display = 'block';
            downloadLink.style.display = 'block';
            progressArea.style.display = 'none';
            
            showMessage('✅ Конвертация завершена!');
        } catch (err) {
            console.error(err);
            showMessage(`❌ Ошибка: ${err.message}`, true);
            progressArea.style.display = 'none';
        }
    }
    
    // ========== СОХРАНЕНИЕ (через DownloadListener в MainActivity) ==========
    function saveFile() {
        if (!currentBlob || !currentFileName) {
            showMessage('❌ Нет файла для сохранения', true);
            return;
        }
        
        const url = URL.createObjectURL(currentBlob);
        
        // WebView перехватит через DownloadListener и откроет в системном браузере
        window.location.href = url;
        
        setTimeout(() => {
            URL.revokeObjectURL(url);
        }, 1000);
        
        showMessage('📲 Открывается браузер для скачивания...');
    }
    
    // ========== ПОДКЛЮЧАЕМ ОБРАБОТЧИКИ ==========
    convertBtn.onclick = convertFile;
    downloadLink.onclick = saveFile;
    
    progressArea.style.display = 'none';
    
    console.log('✅ Конвертер готов (локальная конвертация STL → OBJ/GLB/GLTF)');
</script>
</body>
</html>
