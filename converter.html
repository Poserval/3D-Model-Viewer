<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Constructor - Конвертер</title>
    <meta name="theme-color" content="#007AFF">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-logo { margin: 0 auto 20px; text-align: center; }
        .logo-image { width: 200px; height: 200px; object-fit: contain; }
        .converter-content {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(15px);
        }
        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-icon { font-size: 36px; color: white; }
        .upload-text { color: white; font-size: 16px; font-weight: 600; }
        .upload-hint { color: rgba(255, 255, 255, 0.7); font-size: 12px; margin-top: 5px; }
        .file-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .format-col { flex: 1; }
        .format-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
        }
        .format-select option { background: #333; color: white; }
        .format-arrow { color: white; font-size: 24px; text-align: center; }
        .convert-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            margin-bottom: 20px;
        }
        .progress-area { margin-bottom: 20px; display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #C850C0);
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text { color: white; text-align: center; margin-top: 5px; }
        .result-area { margin-bottom: 20px; display: none; }
        .result-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
        }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .download-area { display: none; }
        .download-link {
            display: block;
            padding: 14px;
            background: linear-gradient(145deg, #4CAF50, #45a049);
            border-radius: 12px;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }
        .back-btn {
            background: #95a5a6;
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-logo">
            <img src="icons/logo-header2.png" alt="3D Constructor" class="logo-image">
        </div>

        <div class="converter-content">
            <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf,.ply,.3ds" style="display: none;">

            <div class="upload-area" id="dropArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Нажмите для выбора файла</div>
                <div class="upload-hint">STL · OBJ · GLB · GLTF · PLY · 3DS</div>
            </div>

            <div id="fileInfo" class="file-info">Ничего не выбрано</div>

            <div class="format-row">
                <div class="format-col">
                    <select id="fromFormat" class="format-select">
                        <option value="stl">STL</option>
                        <option value="obj">OBJ</option>
                        <option value="glb">GLB</option>
                        <option value="gltf">GLTF</option>
                    </select>
                </div>
                <div class="format-arrow">→</div>
                <div class="format-col">
                    <select id="toFormat" class="format-select">
                        <option value="stl">STL</option>
                        <option value="obj">OBJ</option>
                        <option value="glb">GLB</option>
                        <option value="gltf">GLTF</option>
                    </select>
                </div>
            </div>

            <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>

            <div id="progressArea" class="progress-area">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div id="progressText" class="progress-text">0%</div>
            </div>

            <div id="resultArea" class="result-area">
                <div class="result-info">
                    <div class="result-item"><span>📄 Было:</span><span id="originalFileDetails">-</span></div>
                    <div class="result-item"><span>✅ Стало:</span><span id="convertedFileDetails">-</span></div>
                </div>
            </div>

            <div id="downloadArea" class="download-area">
                <a id="downloadLink" class="download-link">📥 Скачать файл</a>
            </div>

            <button class="back-btn" onclick="window.location.href='index.html'">← Назад</button>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let convertedBlob = null;
        let convertedFileName = '';
        
        function showMessage(msg, isError) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = isError ? '#e74c3c' : '#27ae60';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '50px';
            toast.style.fontSize = '14px';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        function formatSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = text || percent + '%';
        }
        
        // Выбор файла
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        
        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                document.getElementById('fileInfo').innerHTML = `<strong>${selectedFile.name}</strong><br>📦 ${formatSize(selectedFile.size)} · 🏷️ ${ext.toUpperCase()}`;
                showMessage('✅ Файл выбран: ' + selectedFile.name);
            }
        };
        
        // Drag & drop
        dropArea.ondragover = (e) => { e.preventDefault(); dropArea.style.background = 'rgba(255,255,255,0.25)'; };
        dropArea.ondragleave = () => { dropArea.style.background = 'rgba(255,255,255,0.2)'; };
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.style.background = 'rgba(255,255,255,0.2)';
            const file = e.dataTransfer.files[0];
            if (file) {
                selectedFile = file;
                const ext = file.name.split('.').pop().toLowerCase();
                document.getElementById('fileInfo').innerHTML = `<strong>${file.name}</strong><br>📦 ${formatSize(file.size)} · 🏷️ ${ext.toUpperCase()}`;
                showMessage('✅ Файл выбран: ' + file.name);
            }
        };
        
        // Конвертация через сервер
        document.getElementById('convertBtn').onclick = async () => {
            if (!selectedFile) {
                showMessage('❌ Сначала выберите файл', true);
                return;
            }
            
            const from = document.getElementById('fromFormat').value;
            const to = document.getElementById('toFormat').value;
            
            if (from === to) {
                showMessage('⚠️ Нельзя конвертировать в тот же формат', true);
                return;
            }
            
            const progressArea = document.getElementById('progressArea');
            const resultArea = document.getElementById('resultArea');
            const downloadArea = document.getElementById('downloadArea');
            
            progressArea.style.display = 'block';
            resultArea.style.display = 'none';
            downloadArea.style.display = 'none';
            updateProgress(0, 'Загрузка...');
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('fromFormat', from);
            formData.append('toFormat', to);
            
            try {
                updateProgress(20, 'Отправка на сервер...');
                
                // СМЕНИ ЭТОТ URL НА ТВОЙ IP
                const response = await fetch('http://10.237.155.221:3000/convert', {
                    method: 'POST',
                    body: formData
                });
                
                updateProgress(70, 'Конвертация...');
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка сервера');
                }
                
                const blob = await response.blob();
                
                updateProgress(100, 'Готово!');
                
                convertedBlob = blob;
                convertedFileName = selectedFile.name.replace(/\.[^/.]+$/, '') + '.' + to;
                
                document.getElementById('originalFileDetails').innerHTML = `${selectedFile.name} · ${formatSize(selectedFile.size)}`;
                document.getElementById('convertedFileDetails').innerHTML = `${convertedFileName} · ${formatSize(blob.size)}`;
                
                resultArea.style.display = 'block';
                downloadArea.style.display = 'block';
                progressArea.style.display = 'none';
                
                showMessage('✅ Конвертация завершена!');
                
            } catch (error) {
                console.error(error);
                progressArea.style.display = 'none';
                showMessage(`❌ Ошибка: ${error.message}`, true);
            }
        };
        
        // Сохранение через Android
        document.getElementById('downloadLink').onclick = (e) => {
            e.preventDefault();
            if (!convertedBlob || !convertedFileName) {
                showMessage('❌ Нет файла для сохранения', true);
                return;
            }
            
            if (window.Android && window.Android.saveFile) {
                const reader = new FileReader();
                reader.onload = function() {
                    const base64 = reader.result.split(',')[1];
                    window.Android.saveFile(base64, convertedFileName);
                };
                reader.readAsDataURL(convertedBlob);
            } else {
                const url = URL.createObjectURL(convertedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = convertedFileName;
                a.click();
                URL.revokeObjectURL(url);
                showMessage('💾 Файл сохранён в папку Downloads');
            }
        };
        
        // Загрузка из параметров URL
        const urlParams = new URLSearchParams(window.location.search);
        const fileDataBase64 = urlParams.get('data');
        if (fileDataBase64) {
            try {
                const fileDataStr = decodeURIComponent(escape(atob(fileDataBase64)));
                const fileData = JSON.parse(fileDataStr);
                selectedFile = { name: fileData.name, size: fileData.size, type: fileData.type };
                const ext = fileData.name.split('.').pop().toLowerCase();
                document.getElementById('fileInfo').innerHTML = `<strong>${fileData.name}</strong><br>📦 ${formatSize(fileData.size)} · 🏷️ ${ext.toUpperCase()} ✅ Из приложения`;
                showMessage('✅ Файл загружен из приложения');
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
