<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .converter-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        
        .file-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .file-area:hover { background: rgba(255, 255, 255, 0.25); }
        .file-area.dragover { background: rgba(255, 255, 255, 0.3); border-color: #007AFF; }
        .file-icon { font-size: 48px; margin-bottom: 10px; }
        
        .selected-file {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .format-col { flex: 1; }
        .format-arrow { font-size: 24px; opacity: 0.7; }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.9; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
        }
        
        select option { background: #333; }
        
        button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #0056CC;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #007AFF;
            transition: width 0.3s;
        }
        
        .download-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-decoration: underline;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .download-link:hover { background: rgba(255, 255, 255, 0.2); }
        
        .footer-note { text-align: center; font-size: 12px; opacity: 0.6; margin-top: 20px; }
        
        @media (max-width: 480px) {
            .format-row { flex-direction: column; gap: 10px; }
            .format-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <h1>🔄 Конвертер 3D форматов</h1>
        
        <input type="file" id="fileInput" accept=".glb,.gltf,.obj,.stl,.3ds" style="display: none;">
        
        <div class="file-area" id="dropArea">
            <div class="file-icon">📁</div>
            <div>Нажмите для выбора файла</div>
            <div style="font-size: 12px; opacity: 0.7; margin-top: 10px;">
                Поддерживаются: GLB, GLTF, OBJ, STL, 3DS
            </div>
        </div>
        
        <div id="selectedFileInfo" class="selected-file" style="display: none;"></div>
        
        <div class="format-row">
            <div class="format-col">
                <label>Из формата</label>
                <select id="fromFormat">
                    <option value="glb">GLB (Binary glTF)</option>
                    <option value="gltf">GLTF (JSON glTF)</option>
                    <option value="obj">OBJ (Wavefront)</option>
                    <option value="stl">STL (Stereolithography)</option>
                    <option value="3ds">3DS (3D Studio)</option>
                </select>
            </div>
            <div class="format-arrow">→</div>
            <div class="format-col">
                <label>В формат</label>
                <select id="toFormat">
                    <option value="glb">GLB (Binary glTF)</option>
                    <option value="gltf">GLTF (JSON glTF)</option>
                    <option value="obj">OBJ (Wavefront)</option>
                    <option value="stl">STL (Stereolithography)</option>
                </select>
            </div>
        </div>
        
        <button id="convertBtn">🔄 Конвертировать</button>
        
        <div id="progressArea" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin: 10px 0;">0%</div>
        </div>
        
        <div id="downloadArea" style="display: none;">
            <a id="downloadLink" class="download-link">📥 Скачать готовый файл</a>
        </div>
        
        <div id="debugInfo" style="margin-top: 10px; font-size: 12px; opacity: 0.7; display: none;"></div>
        
        <div class="footer-note">
            Конвертация выполняется в браузере
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        let selectedFile = null;
        
        if (fileName) {
            document.getElementById('selectedFileInfo').style.display = 'block';
            document.getElementById('selectedFileInfo').innerHTML = `
                <strong>Файл из приложения:</strong><br>
                ${fileName}
            `;
        }
        
        document.getElementById('dropArea').onclick = () => {
            document.getElementById('fileInput').click();
        };
        
        document.getElementById('fileInput').onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('selectedFileInfo').style.display = 'block';
                document.getElementById('selectedFileInfo').innerHTML = `
                    <strong>Выбран:</strong> ${selectedFile.name}<br>
                    <strong>Размер:</strong> ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Реальный формат:</strong> ${selectedFile.name.split('.').pop().toLowerCase()}
                `;
            }
        };
        
        document.getElementById('convertBtn').onclick = () => {
            if (!selectedFile && !fileName) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = document.getElementById('fromFormat').value;
            const to = document.getElementById('toFormat').value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('downloadArea').style.display = 'none';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        document.getElementById('downloadArea').style.display = 'block';
                        
                        if (selectedFile) {
                            // Убираем расширение один раз!
                            let baseName = selectedFile.name;
                            // Удаляем ВСЕ расширения в конце
                            baseName = baseName.replace(/\.[^/.]+$/, '');
                            // Убираем возможный .stl в конце
                            baseName = baseName.replace(/\.stl$/i, '');
                            baseName = baseName.replace(/\.glb$/i, '');
                            baseName = baseName.replace(/\.gltf$/i, '');
                            baseName = baseName.replace(/\.obj$/i, '');
                            
                            const newFileName = baseName + '.' + to;
                            
                            // Создаем тестовый бинарный файл
                            const blob = new Blob(['TEST'], {type: 'application/octet-stream'});
                            document.getElementById('downloadLink').href = URL.createObjectURL(blob);
                            document.getElementById('downloadLink').download = newFileName;
                            
                            // Показываем отладочную информацию
                            document.getElementById('debugInfo').style.display = 'block';
                            document.getElementById('debugInfo').innerHTML = `
                                <strong>Отладка:</strong><br>
                                Оригинал: ${selectedFile.name}<br>
                            `;
                        } else {
                            const blob = new Blob(['TEST'], {type: 'application/octet-stream'});
                            document.getElementById('downloadLink').href = URL.createObjectURL(blob);
                            document.getElementById('downloadLink').download = 'converted.' + to;
                        }
                    }, 500);
                }
            }, 200);
        };
    </script>
</body>
</html>
