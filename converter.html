<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3DViewer - Конвертер</title>
    <meta name="theme-color" content="#007AFF">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .app-logo { text-align: center; margin-bottom: -40px; }
        .logo-image { width: 200px; height: 200px; object-fit: contain; }
        .converter-content {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            padding: 25px;
            backdrop-filter: blur(15px);
        }
        .upload-area {
            background: rgba(255,255,255,0.2);
            border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-icon { font-size: 48px; }
        .upload-text { color: white; font-size: 18px; font-weight: 600; }
        .upload-hint { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 8px; }
        .file-info {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .format-select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        .format-select option { background: #333; color: white; }
        .arrow { color: white; font-size: 24px; text-align: center; }
        .convert-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            margin-bottom: 20px;
        }
        .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-area { margin-bottom: 20px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.3s; }
        .progress-text { color: white; text-align: center; margin-top: 5px; font-size: 13px; }
        .result-area { margin-bottom: 20px; display: none; }
        .result-info {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .download-link {
            display: block;
            padding: 12px;
            background: #4CAF50;
            border-radius: 12px;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #000000cc;
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            transition: 0.2s;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="container">
    <div class="app-logo">
        <img src="icons/logo-header2.png" alt="3D Model Viewer Logo" class="logo-image">
    </div>
    <div class="converter-content">
        <!-- КНОПКА ВЫБОРА ФАЙЛА (ВИДИМАЯ, НЕ СКРЫТАЯ) -->
        <input type="file" id="fileInput" accept=".stl,.STL" style="display: none;">
        
        <div class="upload-area" id="dropArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Выберите STL файл</div>
            <div class="upload-hint">Нажмите или перетащите файл</div>
        </div>
        
        <div id="fileInfo" class="file-info">Ничего не выбрано</div>
        
        <div class="format-row">
            <select id="toFormat" class="format-select">
                <option value="obj">OBJ</option>
                <option value="glb">GLB</option>
                <option value="gltf">GLTF</option>
            </select>
            <div class="arrow">→</div>
            <select id="fromFormat" class="format-select" disabled>
                <option value="stl">STL</option>
            </select>
        </div>
        
        <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>
        
        <div id="progressArea" class="progress-area">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div id="resultArea" class="result-area">
            <div class="result-info">
                <div class="result-item"><span>📄 Было:</span><span id="originalFileDetails">-</span></div>
                <div class="result-item"><span>✅ Стало:</span><span id="convertedFileDetails">-</span></div>
            </div>
        </div>
        
        <a id="downloadLink" class="download-link" style="display: none;">📥 Скачать файл</a>
        <a href="index.html" class="back-link">← На главную</a>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/STLLoader.js';
    import { OBJExporter } from 'https://unpkg.com/three@0.128.0/examples/jsm/exporters/OBJExporter.js';
    import { GLTFExporter } from 'https://unpkg.com/three@0.128.0/examples/jsm/exporters/GLTFExporter.js';

    // DOM элементы
    const fileInput = document.getElementById('fileInput');
    const dropArea = document.getElementById('dropArea');
    const fileInfo = document.getElementById('fileInfo');
    const toFormatSelect = document.getElementById('toFormat');
    const convertBtn = document.getElementById('convertBtn');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultArea = document.getElementById('resultArea');
    const originalFileDetails = document.getElementById('originalFileDetails');
    const convertedFileDetails = document.getElementById('convertedFileDetails');
    const downloadLink = document.getElementById('downloadLink');
    const toastEl = document.getElementById('toastMsg');

    let selectedFile = null;
    let currentBlob = null;
    let currentFileName = '';

    function showMessage(msg, isError = false) {
        toastEl.textContent = msg;
        toastEl.style.background = isError ? '#b91c1ccc' : '#0f172acc';
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    function formatSize(bytes) {
        if (!bytes) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function updateProgress(percent, text) {
        progressFill.style.width = percent + '%';
        progressText.textContent = text || (percent + '%');
    }

    function resetUI() {
        resultArea.style.display = 'none';
        downloadLink.style.display = 'none';
        progressArea.style.display = 'none';
        convertBtn.disabled = false;
    }

    function onFileSelected(file) {
        if (!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'stl') {
            showMessage('❌ Поддерживаются только STL файлы', true);
            return;
        }
        if (file.size > 200 * 1024 * 1024) {
            showMessage('❌ Файл больше 200 МБ', true);
            return;
        }
        resetUI();
        selectedFile = file;
        fileInfo.innerHTML = `<strong>${file.name}</strong><br>📦 ${formatSize(file.size)} · STL`;
        showMessage('✅ Файл выбран: ' + file.name);
    }

    // Открытие диалога выбора файла
    dropArea.addEventListener('click', () => {
        fileInput.click();
    });
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) onFileSelected(e.target.files[0]);
    });
    
    // Drag & drop
    dropArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropArea.style.background = 'rgba(255,255,255,0.3)';
    });
    dropArea.addEventListener('dragleave', () => {
        dropArea.style.background = 'rgba(255,255,255,0.2)';
    });
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.style.background = 'rgba(255,255,255,0.2)';
        const file = e.dataTransfer.files[0];
        if (file) onFileSelected(file);
    });

    async function convertFile() {
        if (!selectedFile) {
            showMessage('❌ Сначала выберите STL файл', true);
            return;
        }
        const targetFormat = toFormatSelect.value;
        convertBtn.disabled = true;
        progressArea.style.display = 'block';
        resultArea.style.display = 'none';
        downloadLink.style.display = 'none';
        updateProgress(10, 'Чтение файла...');
        
        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            updateProgress(30, 'Загрузка геометрии...');
            
            const loader = new STLLoader();
            const geometry = loader.parse(arrayBuffer);
            const material = new THREE.MeshStandardMaterial({ color: 0x66ccff });
            const mesh = new THREE.Mesh(geometry, material);
            const scene = new THREE.Scene();
            scene.add(mesh);
            scene.add(new THREE.AmbientLight(0xffffff));
            
            updateProgress(60, 'Конвертация в ' + targetFormat.toUpperCase() + '...');
            
            let blob;
            if (targetFormat === 'obj') {
                const exporter = new OBJExporter();
                const data = exporter.parse(scene);
                blob = new Blob([data], { type: 'text/plain' });
            } else if (targetFormat === 'glb' || targetFormat === 'gltf') {
                const exporter = new GLTFExporter();
                const data = await new Promise((resolve, reject) => {
                    exporter.parse(scene, resolve, reject, { binary: targetFormat === 'glb' });
                });
                blob = new Blob([data], { type: targetFormat === 'glb' ? 'application/octet-stream' : 'application/json' });
            } else {
                throw new Error('Формат не поддерживается');
            }
            
            updateProgress(100, 'Готово!');
            const originalName = selectedFile.name.replace(/\.stl$/i, '');
            const finalName = `${originalName}_converted.${targetFormat}`;
            currentBlob = blob;
            currentFileName = finalName;
            
            originalFileDetails.innerHTML = `${selectedFile.name} · ${formatSize(selectedFile.size)}`;
            convertedFileDetails.innerHTML = `${finalName} · ${formatSize(blob.size)}`;
            resultArea.style.display = 'block';
            downloadLink.style.display = 'block';
            
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = finalName;
            showMessage('✅ Конвертация завершена!');
        } catch (err) {
            console.error(err);
            showMessage(`❌ Ошибка: ${err.message}`, true);
        } finally {
            progressArea.style.display = 'none';
            convertBtn.disabled = false;
            updateProgress(0);
        }
    }

    convertBtn.addEventListener('click', convertFile);
    downloadLink.addEventListener('click', () => {
        setTimeout(() => {
            if (currentBlob) URL.revokeObjectURL(downloadLink.href);
        }, 1000);
    });
    
    console.log('✅ Конвертер STL → OBJ/GLB/GLTF готов');
</script>
</body>
</html>
