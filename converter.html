<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .converter-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        
        .file-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .file-area:hover { background: rgba(255, 255, 255, 0.25); }
        .file-icon { font-size: 48px; margin-bottom: 10px; }
        
        .selected-file {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .format-col { flex: 1; }
        .format-arrow { font-size: 24px; opacity: 0.7; }
        
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.9; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
        }
        
        select option { background: #333; }
        
        button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #0056CC;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #007AFF;
            transition: width 0.3s;
        }
        
        .download-link {
            display: block;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-decoration: underline;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .download-link:hover { background: rgba(255, 255, 255, 0.2); }
        
        .footer-note { text-align: center; font-size: 12px; opacity: 0.6; margin-top: 20px; }
        
        @media (max-width: 480px) {
            .format-row { flex-direction: column; gap: 10px; }
            .format-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <h1>🔄 Конвертер 3D форматов</h1>
        
        <input type="file" id="fileInput" accept=".glb,.gltf,.obj,.stl" style="display: none;">
        
        <div class="file-area" id="dropArea">
            <div class="file-icon">📁</div>
            <div>Нажмите для выбора файла</div>
            <div style="font-size: 12px; opacity: 0.7; margin-top: 10px;">
                Поддерживаются: GLB, GLTF, OBJ, STL
            </div>
        </div>
        
        <div id="selectedFileInfo" class="selected-file" style="display: none;"></div>
        
        <div class="format-row">
            <div class="format-col">
                <label>Из формата</label>
                <select id="fromFormat">
                    <option value="glb">GLB</option>
                    <option value="gltf">GLTF</option>
                    <option value="obj">OBJ</option>
                    <option value="stl">STL</option>
                </select>
            </div>
            <div class="format-arrow">→</div>
            <div class="format-col">
                <label>В формат</label>
                <select id="toFormat">
                    <option value="glb">GLB</option>
                    <option value="gltf">GLTF</option>
                    <option value="obj">OBJ</option>
                    <option value="stl">STL</option>
                </select>
            </div>
        </div>
        
        <button id="convertBtn">🔄 Конвертировать</button>
        
        <div id="progressArea" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin: 10px 0;">0%</div>
        </div>
        
        <div id="downloadArea" style="display: none;">
            <a id="downloadLink" class="download-link">📥 Скачать готовый файл</a>
        </div>
        
        <div id="debugInfo" style="margin-top: 10px; font-size: 12px; opacity: 0.7; display: none;"></div>
        
        <div class="footer-note">
            Конвертация через Three.js (работает без интернета)
        </div>
    </div>

    <!-- Подключаем Three.js и загрузчики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        let selectedFile = null;
        
        // Элементы
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const selectedFileInfo = document.getElementById('selectedFileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');
        const debugInfo = document.getElementById('debugInfo');
        
        // Если есть имя файла из приложения
        if (fileName) {
            selectedFileInfo.style.display = 'block';
            selectedFileInfo.innerHTML = `
                <strong>Файл из приложения:</strong><br>
                ${fileName}<br>
                <span style="color: #ffaa00;">⚠️ Файл нужно выбрать заново</span>
            `;
        }
        
        // Обработчики
        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                selectedFileInfo.style.display = 'block';
                selectedFileInfo.innerHTML = `
                    <strong>Выбран:</strong> ${selectedFile.name}<br>
                    <strong>Размер:</strong> ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Формат:</strong> ${ext}
                `;
                
                // Автоматически выбираем формат в select
                if (fromFormat.querySelector(`option[value="${ext}"]`)) {
                    fromFormat.value = ext;
                }
            }
        };
        
        // Поддержка drag & drop
        dropArea.ondragover = (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        };
        
        dropArea.ondragleave = () => {
            dropArea.classList.remove('dragover');
        };
        
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                selectedFile = file;
                const ext = file.name.split('.').pop().toLowerCase();
                selectedFileInfo.style.display = 'block';
                selectedFileInfo.innerHTML = `
                    <strong>Выбран:</strong> ${file.name}<br>
                    <strong>Размер:</strong> ${(file.size / 1024 / 1024).toFixed(2)} MB<br>
                    <strong>Формат:</strong> ${ext}
                `;
                if (fromFormat.querySelector(`option[value="${ext}"]`)) {
                    fromFormat.value = ext;
                }
            }
        };
        
        // Функция обновления прогресса
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }
        
        // Функция конвертации через Three.js
        async function convertWithThreeJS(file, targetFormat) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const buffer = e.target.result;
                        
                        // Загружаем файл в зависимости от формата
                        let geometry = null;
                        
                        if (file.name.toLowerCase().endsWith('.stl')) {
                            const loader = new THREE.STLLoader();
                            geometry = loader.parse(buffer);
                            
                            // Создаем объект для экспорта
                            const material = new THREE.MeshStandardMaterial();
                            const mesh = new THREE.Mesh(geometry, material);
                            
                            // Экспортируем в нужный формат
                            if (targetFormat === 'stl') {
                                const exporter = new THREE.STLExporter();
                                const result = exporter.parse(mesh);
                                resolve(result);
                            } else if (targetFormat === 'obj') {
                                const exporter = new THREE.OBJExporter();
                                const result = exporter.parse(mesh);
                                resolve(result);
                            } else {
                                reject(new Error('Конвертация в ' + targetFormat + ' временно недоступна'));
                            }
                        } else {
                            reject(new Error('Поддерживается только STL на данный момент'));
                        }
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }
        
        // Обработчик кнопки конвертации
        convertBtn.onclick = async () => {
            if (!selectedFile) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = fromFormat.value;
            const to = toFormat.value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            // Показываем прогресс
            progressArea.style.display = 'block';
            downloadArea.style.display = 'none';
            updateProgress(0);
            
            try {
                // Показываем прогресс
                updateProgress(30);
                
                // Конвертируем
                const result = await convertWithThreeJS(selectedFile, to);
                
                updateProgress(80);
                
                // Создаем имя файла
                let baseName = selectedFile.name;
                baseName = baseName.replace(/\.[^/.]+$/, '');
                baseName = baseName.replace(/\.(glb|gltf|obj|stl)$/i, '');
                
                const newFileName = baseName + '.' + to;
                
                // Создаем blob и ссылку
                const blob = new Blob([result], {type: 'application/octet-stream'});
                const url = URL.createObjectURL(blob);
                
                updateProgress(100);
                
                downloadLink.href = url;
                downloadLink.download = newFileName;
                downloadArea.style.display = 'block';
                
                // Отладочная информация
                debugInfo.style.display = 'block';
                debugInfo.innerHTML = `
                    <strong>Конвертация выполнена:</strong><br>
                    ${selectedFile.name} → ${newFileName}<br>
                    Размер результата: ${(blob.size / 1024 / 1024).toFixed(2)} MB
                `;
                
                console.log('✅ Конвертация завершена:', newFileName);
                
            } catch (error) {
                console.error('❌ Ошибка конвертации:', error);
                alert('Ошибка конвертации: ' + error.message);
                progressArea.style.display = 'none';
            }
        };
    </script>
</body>
</html>
