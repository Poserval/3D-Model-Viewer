<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Constructor - Конвертер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        .app-logo {
            text-align: center;
            margin-bottom: -40px;
        }

        .logo-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        .converter-content {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            padding: 25px;
            backdrop-filter: blur(15px);
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-icon { font-size: 48px; }
        .upload-text { color: white; font-size: 18px; font-weight: 600; }
        .upload-hint { color: rgba(255, 255, 255, 0.7); font-size: 12px; margin-top: 8px; }

        .file-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .formats-title {
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .format-col { flex: 1; }

        .format-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        .format-select option {
            background: #333;
            color: white;
        }

        .format-arrow {
            color: white;
            font-size: 24px;
            text-align: center;
        }

        .convert-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            margin-bottom: 20px;
        }

        .progress-area { margin-bottom: 20px; display: none; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text { color: white; text-align: center; margin-top: 5px; font-size: 13px; }

        .result-area { margin-bottom: 20px; display: none; }
        .result-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .download-link {
            display: block;
            padding: 12px;
            background: #4CAF50;
            border-radius: 12px;
            color: white;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .back-link {
            display: block;
            text-align: center;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-logo">
            <img src="icons/logo-header2.png" alt="3D Constructor" class="logo-image">
        </div>

        <div class="converter-content">
            <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">

            <div class="upload-area" id="dropArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Нажмите для выбора файла</div>
                <div class="upload-hint">STL · OBJ · GLB · GLTF</div>
            </div>

            <div id="fileInfo" class="file-info">Ничего не выбрано</div>

            <div class="formats-title">ФОРМАТЫ</div>

            <div class="format-row">
                <div class="format-col">
                    <select id="fromFormat" class="format-select">
                        <option value="stl">STL</option>
                        <option value="obj">OBJ</option>
                        <option value="glb">GLB</option>
                        <option value="gltf">GLTF</option>
                    </select>
                </div>
                <div class="format-arrow">→</div>
                <div class="format-col">
                    <select id="toFormat" class="format-select">
                        <option value="stl">STL</option>
                        <option value="obj">OBJ</option>
                        <option value="glb">GLB</option>
                        <option value="gltf">GLTF</option>
                    </select>
                </div>
            </div>

            <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>

            <div id="progressArea" class="progress-area">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <div id="resultArea" class="result-area">
                <div class="result-info">
                    <div class="result-item"><span>📄 Было:</span><span id="originalFileDetails">-</span></div>
                    <div class="result-item"><span>✅ Стало:</span><span id="convertedFileDetails">-</span></div>
                </div>
            </div>

            <a id="downloadLink" class="download-link" style="display: none;">📥 Скачать файл</a>
            <a href="index.html" class="back-link">← На главную</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const fileInfo = document.getElementById('fileInfo');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultArea = document.getElementById('resultArea');
        const originalFileDetails = document.getElementById('originalFileDetails');
        const convertedFileDetails = document.getElementById('convertedFileDetails');
        const downloadLink = document.getElementById('downloadLink');

        let selectedFile = null;
        let currentBlob = null;
        let currentFileName = null;

        const SERVER_URL = 'https://threed-converter-api.onrender.com/convert';

        function showMessage(msg, isError) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = isError ? '#e74c3c' : '#27ae60';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '50px';
            toast.style.fontSize = '14px';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }

        // ВЫБОР ФАЙЛА
        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                const sizeMB = (selectedFile.size / 1024 / 1024).toFixed(2);
                
                fileInfo.innerHTML = `<strong>${selectedFile.name}</strong><br>📦 ${sizeMB} MB · 🏷️ ${ext.toUpperCase()}`;
                
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
                
                showMessage('✅ Файл выбран: ' + selectedFile.name);
            }
        };

        // Drag & drop
        dropArea.ondragover = (e) => { e.preventDefault(); dropArea.style.background = 'rgba(255,255,255,0.3)'; };
        dropArea.ondragleave = () => { dropArea.style.background = 'rgba(255,255,255,0.2)'; };
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.style.background = 'rgba(255,255,255,0.2)';
            const file = e.dataTransfer.files[0];
            if (file) {
                selectedFile = file;
                const ext = file.name.split('.').pop().toLowerCase();
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                fileInfo.innerHTML = `<strong>${file.name}</strong><br>📦 ${sizeMB} MB · 🏷️ ${ext.toUpperCase()}`;
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
                showMessage('✅ Файл выбран: ' + file.name);
            }
        };

        // КОНВЕРТАЦИЯ
        async function convertFile() {
            if (!selectedFile) {
                showMessage('❌ Сначала выберите файл', true);
                return;
            }

            const from = fromFormat.value;
            const to = toFormat.value;

            if (from === to) {
                showMessage('⚠️ Нельзя конвертировать в тот же формат', true);
                return;
            }

            resultArea.style.display = 'none';
            downloadLink.style.display = 'none';
            progressArea.style.display = 'block';
            updateProgress(0);

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('fromFormat', from);
            formData.append('toFormat', to);

            try {
                updateProgress(20);
                const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
                updateProgress(60);
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const blob = await response.blob();
                updateProgress(100);
                
                currentBlob = blob;
                currentFileName = selectedFile.name.replace(/\.[^/.]+$/, '') + '.' + to;
                
                originalFileDetails.innerHTML = `${selectedFile.name} · ${formatSize(selectedFile.size)}`;
                convertedFileDetails.innerHTML = `${currentFileName} · ${formatSize(blob.size)}`;
                
                resultArea.style.display = 'block';
                downloadLink.style.display = 'block';
                progressArea.style.display = 'none';
                showMessage('✅ Конвертация завершена!');
            } catch (error) {
                progressArea.style.display = 'none';
                showMessage('❌ Ошибка: ' + error.message, true);
            }
        }

        // СОХРАНЕНИЕ — открываем в браузере
        function saveFile() {
            if (!currentBlob || !currentFileName) {
                showMessage('❌ Нет файла', true);
                return;
            }
            const url = URL.createObjectURL(currentBlob);
            window.open(url, '_blank');
            showMessage('📲 Файл откроется в браузере, нажмите "Сохранить"');
        }

        convertBtn.onclick = convertFile;
        downloadLink.onclick = saveFile;

        console.log('✅ Конвертер готов');
    </script>
</body>
</html>
