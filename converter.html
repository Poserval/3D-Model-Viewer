<!-- 🔥 converter.html - ПОЛНЫЙ КОД СТРАНИЦЫ КОНВЕРТЕРА С АВТОМАТИЧЕСКОЙ ЗАГРУЗКОЙ ФАЙЛА ИЗ ПРИЛОЖЕНИЯ 🔥 -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DViewer - Конвертер</title>
    <meta name="theme-color" content="#007AFF">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,204,112,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* ХЕДЕР */
        .app-logo {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            top: -90px;
            margin-bottom: -100px;
            z-index: 10;
        }

        .logo-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.4)) 
                    drop-shadow(0 0 50px rgba(200, 80, 192, 0.6));
            transform: perspective(1000px) rotateX(2deg) rotateY(1deg);
            transition: transform 0.5s ease, filter 0.3s ease;
            background: transparent;
        }

        .content-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -50px;
        }

        .converter-content {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* ПОЛЕ ЗАГРУЗКИ */
        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 15px 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-icon { font-size: 36px; color: white; margin-bottom: 5px; }
        .upload-text { color: white; font-size: 16px; font-weight: 600; }
        .upload-hint { color: rgba(255, 255, 255, 0.7); font-size: 12px; margin-top: 5px; }

        /* ОКНО ИНФОРМАЦИИ О ФАЙЛЕ */
        .file-info {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .file-info .file-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.95);
            font-size: clamp(12px, 4vw, 16px);
            word-break: break-word;
            line-height: 1.3;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        .file-info .file-details {
            font-size: clamp(11px, 3.5vw, 14px);
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            word-break: break-word;
        }

        .file-info .placeholder-text {
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            font-size: clamp(13px, 4vw, 15px);
            word-break: break-word;
        }

        .file-info .app-badge {
            color: #4CAF50;
            font-size: 12px;
            margin-top: 5px;
            font-weight: 600;
        }

        /* ЗАГОЛОВОК ФОРМАТЫ */
        .formats-title {
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ЯЧЕЙКИ С ПОДПИСЯМИ ВНУТРИ */
        .format-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .format-col {
            flex: 1;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .format-select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 16px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
        }

        .format-select option {
            background: #333;
            color: white;
            text-align: left;
        }

        .select-label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .format-arrow {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        /* КНОПКА */
        .convert-btn {
            width: 100%;
            padding: 16px 0;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(145deg, #007AFF, #0055BB);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .convert-btn:hover {
            background: linear-gradient(145deg, #0055BB, #003B80);
            transform: translateY(-2px);
        }

        /* ПРОГРЕСС */
        .progress-area { 
            margin-bottom: 25px; 
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007AFF, #C850C0);
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text { color: white; text-align: center; margin-top: 5px; font-size: 14px; }

        /* СКАЧИВАНИЕ */
        .download-area { 
            margin-bottom: 25px; 
            text-align: center; 
        }
        .download-link {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            text-decoration: underline;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ДЕБАГ */
        .debug-info {
            color: white;
            font-size: 12px;
            opacity: 0.7;
            text-align: center;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 480px) {
            .logo-image { width: 320px; height: 320px; }
            .format-row { flex-direction: row; }
            .format-arrow { transform: none; }
            
            .file-info {
                padding: 10px;
                min-height: 60px;
            }
            
            .file-info .file-name {
                font-size: clamp(11px, 3.8vw, 14px);
            }
            
            .file-info .file-details {
                font-size: clamp(10px, 3.2vw, 12px);
                gap: 10px;
            }
            
            .format-select {
                padding: 10px 10px 10px 35px;
                font-size: 14px;
            }
            
            .select-label {
                font-size: 12px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-logo">
            <img src="icons/logo-header2.png" alt="3D Model Viewer Logo" class="logo-image">
        </div>

        <div class="content-wrapper">
            <div class="converter-content">
                <input type="file" id="fileInput" accept=".stl,.obj,.glb,.gltf" style="display: none;">

                <div class="upload-area" id="dropArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Нажмите для выбора файла</div>
                    <div class="upload-hint">Поддерживаются: STL, OBJ, GLB, GLTF</div>
                </div>

                <div id="fileInfo" class="file-info">
                    <div id="fileInfoContent" class="placeholder-text">Ничего не выбрано</div>
                </div>

                <div class="formats-title">ФОРМАТЫ</div>

                <div class="format-row">
                    <div class="format-col">
                        <div class="select-wrapper">
                            <span class="select-label">ИЗ</span>
                            <select id="fromFormat" class="format-select">
                                <option value="stl">STL</option>
                                <option value="obj">OBJ</option>
                                <option value="glb">GLB</option>
                                <option value="gltf">GLTF</option>
                            </select>
                        </div>
                    </div>
                    <div class="format-arrow">→</div>
                    <div class="format-col">
                        <div class="select-wrapper">
                            <span class="select-label">В</span>
                            <select id="toFormat" class="format-select">
                                <option value="stl">STL</option>
                                <option value="obj">OBJ</option>
                                <option value="glb">GLB</option>
                                <option value="gltf">GLTF</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button class="convert-btn" id="convertBtn">🔄 Конвертировать</button>

                <div id="progressArea" class="progress-area" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="progressText" class="progress-text">0%</div>
                </div>

                <div id="downloadArea" class="download-area" style="display: none;">
                    <a id="downloadLink" class="download-link" href="#">📥 Скачать готовый файл</a>
                </div>

                <div id="debugInfo" class="debug-info" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const fileInfo = document.getElementById('fileInfo');
        const fileInfoContent = document.getElementById('fileInfoContent');
        const fromFormat = document.getElementById('fromFormat');
        const toFormat = document.getElementById('toFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');
        const debugInfo = document.getElementById('debugInfo');
        
        let selectedFile = null;
        
        // 🔥 ПОЛУЧАЕМ ФАЙЛ ИЗ ОСНОВНОГО ПРИЛОЖЕНИЯ
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        const fileDataBase64 = urlParams.get('data');

        // Если есть данные файла из приложения
        if (fileDataBase64) {
            try {
                // Декодируем данные
                const fileDataStr = decodeURIComponent(escape(atob(fileDataBase64)));
                const fileData = JSON.parse(fileDataStr);
                
                // Показываем информацию
                fileInfoContent.innerHTML = `
                    <div class="file-name">📎 ${fileData.name}</div>
                    <div class="file-details">
                        <span>📦 ${(fileData.size / 1024 / 1024).toFixed(2)} MB</span>
                        <span>🏷️ ${fileData.name.split('.').pop().toUpperCase()}</span>
                    </div>
                    <div class="app-badge">✅ Файл загружен из приложения</div>
                `;
                
                // Автоматически выбираем формат
                const ext = fileData.name.split('.').pop().toLowerCase();
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
                
                // Сохраняем информацию о файле
                selectedFile = {
                    name: fileData.name,
                    size: fileData.size,
                    type: fileData.type
                };
                
            } catch (e) {
                console.error('Ошибка загрузки данных файла:', e);
                fileInfoContent.innerHTML = '❌ Ошибка загрузки файла из приложения';
            }
        } else if (fileName) {
            // Если только имя файла (старая версия)
            fileInfoContent.innerHTML = `
                <div class="file-name">📎 ${fileName}</div>
                <div class="file-details">
                    <span>ℹ️ Информация о файле</span>
                </div>
                <div class="app-badge">📁 Файл из приложения (выберите заново)</div>
            `;
        }
        
        // Обработчики выбора файла
        dropArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const ext = file.name.split('.').pop().toLowerCase();
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                
                fileInfoContent.innerHTML = `
                    <div class="file-name">📎 ${file.name}</div>
                    <div class="file-details">
                        <span>📦 ${sizeMB} MB</span>
                        <span>🏷️ ${ext.toUpperCase()}</span>
                    </div>
                `;
                
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
            }
        };
        
        // Поддержка drag & drop
        dropArea.ondragover = (e) => {
            e.preventDefault();
            dropArea.style.background = 'rgba(255, 255, 255, 0.25)';
        };
        
        dropArea.ondragleave = () => {
            dropArea.style.background = 'rgba(255, 255, 255, 0.2)';
        };
        
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.style.background = 'rgba(255, 255, 255, 0.2)';
            
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                selectedFile = file;
                
                const ext = file.name.split('.').pop().toLowerCase();
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                
                fileInfoContent.innerHTML = `
                    <div class="file-name">📎 ${file.name}</div>
                    <div class="file-details">
                        <span>📦 ${sizeMB} MB</span>
                        <span>🏷️ ${ext.toUpperCase()}</span>
                    </div>
                `;
                
                if (ext === 'stl') fromFormat.value = 'stl';
                else if (ext === 'obj') fromFormat.value = 'obj';
                else if (ext === 'glb') fromFormat.value = 'glb';
                else if (ext === 'gltf') fromFormat.value = 'gltf';
            }
        };
        
        // Функция обновления прогресса
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }
        
        // Обработчик кнопки конвертации
        convertBtn.onclick = async () => {
            if (!selectedFile) {
                alert('Сначала выберите файл');
                return;
            }
            
            const from = fromFormat.value;
            const to = toFormat.value;
            
            if (from === to) {
                alert('Форматы одинаковые, конвертация не нужна');
                return;
            }
            
            progressArea.style.display = 'block';
            downloadArea.style.display = 'none';
            updateProgress(0);
            
            // Эмуляция конвертации (заменить на реальную)
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                updateProgress(progress);
                
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    let baseName = selectedFile.name.replace(/\.[^/.]+$/, '');
                    baseName = baseName.replace(/\.(glb|gltf|obj|stl)$/i, '');
                    
                    const newFileName = baseName + '.' + to;
                    
                    // Создаем тестовый файл (заменить на реальный результат)
                    const dummyContent = 'Конвертированный файл';
                    const blob = new Blob([dummyContent], {type: 'application/octet-stream'});
                    const url = URL.createObjectURL(blob);
                    
                    downloadLink.href = url;
                    downloadLink.download = newFileName;
                    downloadArea.style.display = 'block';
                    
                    debugInfo.style.display = 'block';
                    debugInfo.innerHTML = `✅ Конвертация выполнена:<br>${selectedFile.name} → ${newFileName}`;
                }
            }, 200);
        };
    </script>
</body>
</html>
