name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Clean previous build
      run: rm -rf capacitor-web android
      
    - name: Install dependencies
      run: npm install --package-lock=false
      
    - name: Build web assets
      run: |
        mkdir -p capacitor-web
        cp index.html style.css script.js manifest.json capacitor-web/
        cp -r icons capacitor-web/
        
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace launcher icons with proper scaling
      run: |
        echo "🔄 Заменяем иконки с правильным масштабированием..."
        
        # Создаем уменьшенную версию иконки 108x108 для лучшего отображения
        convert ./icons/icon-app-162.png -resize 108x108 ./icons/icon-108.png 2>/dev/null || echo "ImageMagick не установлен, используем исходную иконку"
        
        # Заменяем иконки на уменьшенную версию
        find android -name "ic_launcher*.png" -type f | while read file; do
          echo "Заменяем: $file"
          if [ -f "./icons/icon-108.png" ]; then
            cp ./icons/icon-108.png "$file" 2>/dev/null || true
          else
            cp ./icons/icon-app-162.png "$file" 2>/dev/null || true
          fi
        done
        
        echo "✅ Иконки заменены с правильным масштабированием!"
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Sign APK with saved keystore
      run: |
        cd android/app/build/outputs/apk/release
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore keystore.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          app-release-unsigned.apk \
          "${{ secrets.KEY_ALIAS }}"
        mv app-release-unsigned.apk 3d-model-viewer.apk
        
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/3d-model-viewer.apk
        retention-days: 30
