name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Clean previous build
      run: rm -rf capacitor-web android
      
    - name: Install dependencies
      run: npm install --package-lock=false
      
    - name: Build web assets
      run: |
        mkdir -p capacitor-web
        cp index.html style.css script.js manifest.json capacitor-web/
        cp -r icons capacitor-web/
        
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace launcher icons
      run: |
        echo "🔄 Заменяем иконки..."
        find android -name "ic_launcher*.png" -type f | while read file; do
          echo "Заменяем: $file"
          cp ./icons/icon-app-162.png "$file" 2>/dev/null || true
        done
        
    - name: Restore keystore from secrets
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        echo "✅ Keystore восстановлен"
        
    - name: Setup signing in build.gradle
      run: |
        echo "" >> android/app/build.gradle
        echo "android {" >> android/app/build.gradle
        echo "    signingConfigs {" >> android/app/build.gradle
        echo "        release {" >> android/app/build.gradle
        echo "            storeFile file('release.keystore')" >> android/app/build.gradle
        echo "            storePassword 'android123'" >> android/app/build.gradle
        echo "            keyAlias 'release_key'" >> android/app/build.gradle
        echo "            keyPassword 'android123'" >> android/app/build.gradle
        echo "        }" >> android/app/build.gradle
        echo "    }" >> android/app/build.gradle
        echo "    buildTypes {" >> android/app/build.gradle
        echo "        release {" >> android/app/build.gradle
        echo "            signingConfig signingConfigs.release" >> android/app/build.gradle
        echo "            minifyEnabled false" >> android/app/build.gradle
        echo "            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'" >> android/app/build.gradle
        echo "        }" >> android/app/build.gradle
        echo "    }" >> android/app/build.gradle
        echo "}" >> android/app/build.gradle
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Signed Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
