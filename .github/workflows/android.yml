name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Clean previous build
      run: rm -rf capacitor-web android
      
    - name: Install dependencies
      run: npm install --package-lock=false
      
    - name: Build web assets
      run: |
        mkdir -p capacitor-web
        cp index.html style.css script.js manifest.json capacitor-web/
        cp -r icons capacitor-web/
        
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace launcher icons
      run: |
        echo "🔄 Заменяем иконки..."
        find android -name "ic_launcher*.png" -type f | while read file; do
          cp ./icons/icon-app-162.png "$file" 2>/dev/null || true
        done
        echo "✅ Иконки заменены!"
      
    - name: Update version for RuStore
      run: |
        echo "🔄 Обновляем версию..."
        cd android/app
        sed -i 's/versionCode [0-9]\+/versionCode 1/' build.gradle
        sed -i 's/versionName "[0-9.]\+"/versionName "1.0.0"/' build.gradle
        echo "✅ Версия: versionCode 1, versionName 1.0.0"
      
    - name: Configure Android signing with permanent keystore
      run: |
        echo "🔐 Настраиваем подпись с постоянным keystore..."
        cd android/app
        
        # Декодируем keystore из секретов
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
        
        cat > signing-config.gradle << EOF
        android {
            signingConfigs {
                release {
                    storeFile file("release.keystore")
                    storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                    keyAlias "${{ secrets.KEY_ALIAS }}"
                    keyPassword "${{ secrets.KEY_PASSWORD }}"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                }
            }
        }
        EOF
        
        echo "apply from: 'signing-config.gradle'" >> build.gradle
        echo "✅ Подпись настроена с постоянным ключом!"
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Signed Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
