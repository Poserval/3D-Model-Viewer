name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build web assets
      run: npm run build
      
    - name: Generate Android project
      run: |
        rm -rf android
        npx cap add android
        npx cap sync android
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Find APK file
      run: |
        echo "🔍 Ищем APK файл..."
        echo "=== Все APK файлы в проекте ==="
        find . -name "*.apk" -type f | while read file; do
          echo "📦 Найден APK: $file"
          ls -la "$file"
        done
        
        echo "=== Содержимое android/ ==="
        find android -name "*.apk" -type f -exec ls -la {} \; || echo "APK не найден в android/"
        
        echo "=== Содержимое build/outputs ==="
        find android -path "*/build/outputs/*" -name "*.apk" -type f -exec ls -la {} \; || echo "APK не найден в build/outputs"
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
          **/*.apk
        retention-days: 30
        if-no-files-found: warn
 
