name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Clean previous build
      run: rm -rf capacitor-web android
      
    - name: Install dependencies
      run: npm install --package-lock=false
      
    - name: Build web assets
      run: |
        mkdir -p capacitor-web
        cp index.html style.css script.js manifest.json capacitor-web/
        cp -r icons capacitor-web/
        
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace launcher icons
      run: |
        echo "🔄 Заменяем иконки..."
        find android -name "ic_launcher*.png" -type f | while read file; do
          cp ./icons/icon-app-162.png "$file" 2>/dev/null || true
        done
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Sign APK with debug key
      run: |
        cd android/app/build/outputs/apk/release
        keytool -genkey -v -keystore debug.keystore -alias debug \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=RU"
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore debug.keystore -storepass android -keypass android \
          app-release-unsigned.apk debug
        mv app-release-unsigned.apk 3d-model-viewer.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/3d-model-viewer.apk
        retention-days: 30
