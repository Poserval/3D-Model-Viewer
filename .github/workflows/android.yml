name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Clean previous build
      run: rm -rf capacitor-web android
      
    - name: Install dependencies
      run: npm install --package-lock=false
      
    - name: Build web assets
      run: |
        mkdir -p capacitor-web
        cp index.html style.css script.js manifest.json capacitor-web/
        cp -r icons capacitor-web/
        
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace launcher icons with proper scaling
      run: |
        echo "🔄 Заменяем иконки с правильным масштабированием..."
        
        # Создаем уменьшенную версию иконки 108x108 для лучшего отображения
        convert ./icons/icon-app-162.png -resize 108x108 ./icons/icon-108.png 2>/dev/null || echo "ImageMagick не установлен, используем исходную иконку"
        
        # Заменяем иконки на уменьшенную версию
        find android -name "ic_launcher*.png" -type f | while read file; do
          echo "Заменяем: $file"
          if [ -f "./icons/icon-108.png" ]; then
            cp ./icons/icon-108.png "$file" 2>/dev/null || true
          else
            cp ./icons/icon-app-162.png "$file" 2>/dev/null || true
          fi
        done
        
        echo "✅ Иконки заменены с правильным масштабированием!"
      
    - name: Update version for RuStore
      run: |
        echo "🔄 Обновляем версию для RuStore..."
        cd android/app
        
        # Увеличиваем versionCode на 1
        CURRENT_CODE=$(grep -oP 'versionCode \K\d+' build.gradle)
        NEW_CODE=$((CURRENT_CODE + 1))
        echo "Текущий versionCode: $CURRENT_CODE -> Новый: $NEW_CODE"
        
        # Обновляем versionCode
        sed -i "s/versionCode [0-9]\+/versionCode $NEW_CODE/" build.gradle
        
        # Обновляем versionName
        sed -i 's/versionName "[0-9.]\+"/versionName "1.1.0"/' build.gradle
        
        echo "✅ Версия обновлена: versionCode $NEW_CODE, versionName 1.1.0"
      
    - name: Configure Android signing
      run: |
        echo "🔐 Настраиваем подпись в Android..."
        cd android/app
        
        # Создаем ключ
        keytool -genkeypair -v \
          -keystore release.keystore \
          -alias release_key \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass "android123" \
          -keypass "android123" \
          -dname "CN=3D Viewer, O=3DViewer, C=RU"
        
        cat > signing-config.gradle << 'EOF'
        android {
            signingConfigs {
                release {
                    storeFile file("release.keystore")
                    storePassword "android123"
                    keyAlias "release_key"
                    keyPassword "android123"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                }
            }
        }
        EOF
        
        echo "apply from: 'signing-config.gradle'" >> build.gradle
        echo "✅ Подпись настроена!"
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Signed Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
