name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build web assets
      run: npm run build
      
    - name: Generate Android project
      run: |
        rm -rf android
        npx cap add android
        npx cap sync android
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Sign APK
      run: |
        echo "🔐 Подписываем APK..."
        cd android/app/build/outputs/apk/release/
        
        # Проверяем наличие файлов
        echo "Содержимое папки:"
        ls -la
        
        # Декодируем keystore
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        
        # Подписываем
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore keystore.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          app-release-unsigned.apk \
          "${{ secrets.KEY_ALIAS }}"
        
        # Переименовываем
        cp app-release-unsigned.apk 3d-model-viewer.apk
        echo "✅ Подписанный APK готов"
        ls -la 3d-model-viewer.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-model-viewer-apk
        path: android/app/build/outputs/apk/release/3d-model-viewer.apk
        retention-days: 30
 
